
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MAHJONG WAYS 1 - SOFT LGOLUX</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root { --gold: #fbbf24; --bg: #064e3b; --panel: #022c22; --accent: #10b981; }
    body { margin: 0; background: #000; color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; display: flex; justify-content: center;}
    .game-container { width: 100%; max-width: 420px; height: 100dvh; display: flex; flex-direction: column; background: radial-gradient(circle at top, #047857 0%, var(--bg) 100%); position: relative; overflow: hidden;}
    
    .top-bar { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%); position: absolute; top: 0; left: 0; right: 0; z-index: 10; padding-top: calc(15px + env(safe-area-inset-top, 0px)); }
    .btn-back { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 12px;}
    .saldo-box { background: rgba(0,0,0,0.8); border: 1px solid var(--gold); padding: 8px 18px; border-radius: 10px; font-weight: 800; color: var(--gold);}
    
    .screen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding-top: 50px; position: relative;}
    
    /* MULTIPLIER BAR ALA MAHJONG */
    .multi-bar { display: flex; gap: 5px; background: rgba(0,0,0,0.6); padding: 8px; border-radius: 20px; border: 2px solid var(--accent); margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);}
    .multi-item { background: #064e3b; color: #6ee7b7; font-weight: 900; font-size: 14px; padding: 5px 15px; border-radius: 12px; transition: 0.3s; border: 1px solid #047857;}
    .multi-item.active { background: linear-gradient(180deg, #fde047, #b45309); color: #000; box-shadow: 0 0 15px #fbbf24; border-color: #fff; transform: scale(1.1);}

    /* GRID MAHJONG 5x4 */
    .slot-grid { display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(4, 1fr); gap: 4px; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 15px; border: 3px solid #047857; width: 92%; aspect-ratio: 5/4; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); position: relative;}
    .slot-cell { background: #022c22; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 30px; position: relative; overflow: hidden; border: 1px solid rgba(16,185,129,0.3);}
    
    .simbol-item { filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5)); transition: transform 0.2s;}
    
    /* ANIMASI TUMBLE */
    .simbol-item.drop { animation: dropDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    .turbo .simbol-item.drop { animation-duration: 0.15s; } /* TURBO MODE */
    
    @keyframes dropDown { 0% { transform: translateY(-200%); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
    
    .simbol-item.break { animation: popBreak 0.3s forwards; }
    .turbo .simbol-item.break { animation-duration: 0.1s; }
    
    @keyframes popBreak { 50% { transform: scale(1.3); filter: brightness(2); } 100% { transform: scale(0); opacity: 0; } }

    /* WILD EMAS SIMULATION */
    .simbol-item.gold { background: radial-gradient(circle, #fbbf24, #b45309); border-radius: 5px; padding: 2px; border: 1px solid #fff;}
    .simbol-item.wild { font-size: 35px; animation: pulseWild 0.5s infinite alternate;}
    @keyframes pulseWild { 0% { transform: scale(1); filter: drop-shadow(0 0 5px #fbbf24);} 100% { transform: scale(1.1); filter: drop-shadow(0 0 15px #fde047);} }

    .float-coin { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 28px; font-weight: 900; color: #10b981; text-shadow: 0 2px 5px black, 0 0 10px white; z-index: 20; opacity: 0; pointer-events: none; width: 100%; text-align: center;}
    .float-coin.show { animation: floatUp 1s ease-out forwards; }
    .turbo .float-coin.show { animation-duration: 0.4s; }
    @keyframes floatUp { 0% { transform: translate(-50%, -10%); opacity: 1; } 100% { transform: translate(-50%, -100px); opacity: 0; } }

    .spin-win-box { background: rgba(0,0,0,0.8); border: 2px solid var(--accent); border-radius: 15px; padding: 5px 20px; margin-top: 15px; text-align: center; display: none;}
    .sw-label { font-size: 10px; color: #fff; font-weight: bold;}
    .sw-val { font-size: 26px; font-weight: 900; color: var(--accent);}

    .status-msg { font-size: 14px; font-weight: 900; color: #fff; z-index: 10; margin-top: 10px; background: rgba(0,0,0,0.8); padding: 8px 20px; border-radius: 30px; text-align: center; border: 1px solid var(--accent); display: none;}

    /* PANEL BAWAH & TOMBOL TURBO */
    .panel { background: var(--panel); padding: 15px; border-top: 3px solid var(--accent); z-index: 10; border-radius: 25px 25px 0 0; padding-bottom: calc(15px + env(safe-area-inset-bottom, 0px));}
    .input-row { display: flex; gap: 10px; margin-bottom: 10px;}
    .bet-box { flex: 1; background: #000; border: 1px solid #064e3b; border-radius: 12px; padding: 10px; display: flex; flex-direction: column;}
    .bet-box label { font-size: 10px; color:#6ee7b7; font-weight: bold; margin-bottom: 2px;}
    .bet-box input { width: 100%; border: none; background: transparent; color: white; font-size: 18px; font-weight: 900; outline: none;}
    
    .action-row { display: flex; gap: 8px; justify-content: space-between; align-items: stretch;}
    
    .btn-circle { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #047857; background: #000; color: white; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s;}
    .btn-circle.active { background: var(--accent); color: #000; border-color: #fff; box-shadow: 0 0 15px var(--accent);}
    
    .btn-spin { flex: 1; border-radius: 15px; border: none; font-weight: 900; font-size: 20px; cursor: pointer; color: #000; background: linear-gradient(180deg, #34d399, var(--accent)); box-shadow: 0 5px 0 #047857; display: flex; align-items: center; justify-content: center;}
    .btn-spin:active { transform: translateY(5px); box-shadow: 0 0 0 #047857; }
    
    .disabled { filter: grayscale(1); pointer-events: none; opacity: 0.6;}

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: none; align-items: center; justify-content: center;}
    .win-modal { background: radial-gradient(circle, #047857, #022c22); padding: 25px; border-radius: 20px; text-align: center; border: 3px solid var(--gold); width: 85%; max-width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);}
    .win-title { font-size: 35px !important; color: #fff !important; text-shadow: 0 5px 10px rgba(0,0,0,0.5); margin: 0;}
    .win-amount { font-size: 40px; font-weight: 900; color: #fff; margin: 15px 0; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5));}
    .btn-yes { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--gold); color: #000; font-weight: 900; font-size: 16px; cursor: pointer;}
  </style>
</head>
<body>
  <div class="game-container" id="gc">
    <div id="win-modal" class="modal-overlay">
        <div class="win-modal">
            <h2 class="win-title">SENSASIONAL!</h2>
            <p style="color:white; font-size: 14px;">Kemenangan Anda:</p>
            <div id="win-amount" class="win-amount">🪙 0</div>
            <button class="btn-yes" onclick="closeWinModal()">LANJUTKAN</button>
        </div>
    </div>

    <div class="top-bar">
      <a href="/" class="btn-back">🔙 LOBI</a>
      <div class="saldo-box">🪙 <span id="n-c">0</span></div>
    </div>
    
    <div class="screen">
      <div class="multi-bar" id="m-bar">
          <div class="multi-item active" id="m-1">x1</div>
          <div class="multi-item" id="m-2">x2</div>
          <div class="multi-item" id="m-3">x3</div>
          <div class="multi-item" id="m-5">x5</div>
      </div>

      <div class="slot-grid" id="grid">
          <div id="float-coin" class="float-coin">+ 🪙 0</div>
      </div>
      
      <div id="spin-win-box" class="spin-win-box">
          <div class="sw-label">KEMENANGAN SPIN INI</div>
          <div id="spin-win-val" class="sw-val">🪙 0</div>
      </div>

      <div id="status-msg" class="status-msg">MEMUTAR...</div>
    </div>

    <div class="panel" id="bet-panel">
      <div class="input-row">
        <div class="bet-box">
            <label>BET AMOUNT</label>
            <input type="text" id="bet-input" value="400" oninput="formatRupiah(this)">
        </div>
      </div>
      
      <div class="action-row">
          <div class="btn-circle" id="btn-turbo" onclick="toggleTurbo()">⚡</div>
          
          <button class="btn-spin" onclick="playSlot('manual')">🔄 SPIN</button>
          
          <div class="btn-circle" onclick="alert('Fitur Auto Spin Segera Hadir!')">♾️</div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let socket;
    const symbols = ['🀄', '🐉', '🀅', '🎋', '🪙']; 
    let isTurbo = false;
    let isFreespinMode = false;

    fetch('/api/me').then(r => r.json()).then(d => { if(!d.loggedIn) window.location.href = '/'; else masuk(d); });
    function formatRupiah(obj) { let val = obj.value.replace(/[^0-9]/g, ''); obj.value = val ? parseInt(val).toLocaleString('id-ID') : ''; }
    
    // Init Grid 5x4 (20 Kotak)
    function initGrid() { 
        const grid = document.getElementById('grid'); 
        grid.innerHTML = '<div id="float-coin" class="float-coin">+ 🪙 0</div>'; 
        for(let i=0; i<20; i++) grid.innerHTML += `<div class="slot-cell" id="c-${i}"><div class="simbol-item drop">?</div></div>`; 
    }
    initGrid();

    function toggleTurbo() {
        isTurbo = !isTurbo;
        const btn = document.getElementById('btn-turbo');
        if(isTurbo) {
            btn.classList.add('active');
            document.getElementById('gc').classList.add('turbo');
        } else {
            btn.classList.remove('active');
            document.getElementById('gc').classList.remove('turbo');
        }
    }

    function updateMultiBar(step, isFS) {
        // Reset semua
        document.getElementById('m-1').classList.remove('active');
        document.getElementById('m-2').classList.remove('active');
        document.getElementById('m-3').classList.remove('active');
        document.getElementById('m-5').classList.remove('active');

        // Ganti angka kalau mode Freespin
        if(isFS) {
            document.getElementById('m-1').innerText = 'x2';
            document.getElementById('m-2').innerText = 'x4';
            document.getElementById('m-3').innerText = 'x6';
            document.getElementById('m-5').innerText = 'x10';
        } else {
            document.getElementById('m-1').innerText = 'x1';
            document.getElementById('m-2').innerText = 'x2';
            document.getElementById('m-3').innerText = 'x3';
            document.getElementById('m-5').innerText = 'x5';
        }

        // Nyalakan box sesuai step (0 = awal, 1 = tumble ke-1, dst)
        if(step === 0) document.getElementById('m-1').classList.add('active');
        else if(step === 1) document.getElementById('m-2').classList.add('active');
        else if(step === 2) document.getElementById('m-3').classList.add('active');
        else document.getElementById('m-5').classList.add('active');
    }

    function showWinModal(amount) { document.getElementById('win-amount').innerText = `🪙 ${amount.toLocaleString('id-ID')}`; document.getElementById('win-modal').style.display = 'flex'; }
    function closeWinModal() { document.getElementById('win-modal').style.display = 'none'; document.getElementById('bet-panel').classList.remove('disabled'); document.getElementById('gc').style.background = 'radial-gradient(circle at top, #047857 0%, var(--bg) 100%)'; document.getElementById('status-msg').style.display = 'none'; updateMultiBar(0, false); }

    function masuk(d) {
      document.getElementById('n-c').innerText = d.coin.toLocaleString('id-ID');
      socket = io();
      socket.on('update_coin', c => document.getElementById('n-c').innerText = c.toLocaleString('id-ID'));
      socket.on('game_result', r => { if(r.status === 'error') { alert(r.msg); document.getElementById('bet-panel').classList.remove('disabled'); document.getElementById('status-msg').style.display = 'none'; } });
      
      socket.on('slot_normal_result', (data) => {
          isFreespinMode = false;
          executeTumble(data, false, () => {
              let msgBox = document.getElementById('status-msg');
              msgBox.innerText = data.status === 'win' ? `🎉 MENANG: 🪙 ${data.winAmount.toLocaleString('id-ID')}` : `💀 ZONK`;
              msgBox.style.color = data.status === 'win' ? '#10b981' : '#fca5a5';
              setTimeout(() => { document.getElementById('bet-panel').classList.remove('disabled'); msgBox.style.display = 'none'; }, isTurbo ? 500 : 1000);
          });
      });

      socket.on('slot_freespin_start', async (data) => {
          isFreespinMode = true;
          document.getElementById('gc').style.background = 'radial-gradient(circle at top, #7f1d1d 0%, #450a0a 100%)'; // Tema merah Freespin
          
          if(data.isMurni) {
              document.getElementById('status-msg').innerText = '🔴 SCATTER DIDAPATKAN!';
              for(let i=0; i<20; i++) { let cell = document.getElementById(`c-${i}`); cell.innerHTML = `<div class="simbol-item drop">${symbols[Math.floor(Math.random() * symbols.length)]}</div>`; }
              let sIdx = [2, 7, 12]; sIdx.forEach(idx => { document.getElementById(`c-${idx}`).innerHTML = `<div class="simbol-item drop" style="font-size:40px">🔴</div>`; });
              await new Promise(r => setTimeout(r, 2000));
          }
          
          let spinArray = data.spins; 
          let maxRounds = data.totalRounds || 12;
          
          const runSpins = async () => {
              for(let i=0; i<maxRounds; i++) {
                  document.getElementById('status-msg').innerText = `🔥 FREESPIN: ${maxRounds - i} TERSISA`;
                  await new Promise(resolve => executeTumble(spinArray[i], true, resolve));
              }
              setTimeout(() => {
                  document.getElementById('n-c').innerText = data.finalCoin.toLocaleString('id-ID');
                  showWinModal(data.finalWin); 
                  isFreespinMode = false;
              }, 1000);
          };
          runSpins();
      });
    }

    function executeTumble(data, isFreespin, callback) {
        let winSym = data.symbol; let winAmt = data.winAmount || data.win; let tumbles = data.tumbles || 0; 
        let spinWinAcc = 0;
        
        let tDelay = isTurbo ? 200 : 600; // Speed control
        
        document.getElementById('spin-win-box').style.display = 'none'; 
        document.getElementById('spin-win-val').style.color = '#10b981';
        updateMultiBar(0, isFreespin);

        for(let i=0; i<20; i++) { 
            let cell = document.getElementById(`c-${i}`); 
            // Randomly buat bbrp simbol jadi emas (simulasi Mahjong)
            let isGold = Math.random() < 0.15 ? 'gold' : '';
            cell.innerHTML = `<div class="simbol-item drop ${isGold}">${symbols[Math.floor(Math.random() * symbols.length)]}</div>`; 
        }
        document.getElementById('float-coin').classList.remove('show');

        if (winAmt === 0) { setTimeout(callback, tDelay + 200); return; }

        let currentTumble = 0; let winPerTumble = Math.floor(winAmt / tumbles); 

        const runTumble = () => {
            if (currentTumble >= tumbles) {
                setTimeout(callback, tDelay + 200);
                return;
            }

            setTimeout(() => {
                updateMultiBar(currentTumble, isFreespin); // Gerakin Multiplier Bar

                let breakIndices = [];
                // Mahjong mecah dari kiri ke kanan (kolom 0, 1, 2)
                let baseCols = [0, 1, 2];
                baseCols.forEach(col => {
                    let row = Math.floor(Math.random() * 4);
                    let idx = (row * 5) + col;
                    breakIndices.push(idx);
                });
                // Tambah random biar rame
                while(breakIndices.length < 5) { let r = Math.floor(Math.random() * 20); if(!breakIndices.includes(r)) breakIndices.push(r); }
                
                for(let i=0; i<20; i++) { 
                    let cell = document.getElementById(`c-${i}`); 
                    if (breakIndices.includes(i)) cell.innerHTML = `<div class="simbol-item break">${winSym}</div>`; 
                }

                setTimeout(() => {
                    let floatC = document.getElementById('float-coin'); floatC.innerText = `+ 🪙 ${winPerTumble.toLocaleString('id-ID')}`; floatC.classList.remove('show'); void floatC.offsetWidth; floatC.classList.add('show');
                    spinWinAcc += winPerTumble;
                    document.getElementById('spin-win-box').style.display = 'block'; document.getElementById('spin-win-val').innerText = '🪙 ' + spinWinAcc.toLocaleString('id-ID');
                    
                    setTimeout(() => {
                        for(let i=0; i<20; i++) { 
                            if (breakIndices.includes(i)) {
                                // Simulasi emas pecah jadi WILD
                                let jadiWild = Math.random() < 0.3;
                                if(jadiWild) {
                                    document.getElementById(`c-${i}`).innerHTML = `<div class="simbol-item drop wild">🟨</div>`;
                                } else {
                                    document.getElementById(`c-${i}`).innerHTML = `<div class="simbol-item drop">${symbols[Math.floor(Math.random() * symbols.length)]}</div>`; 
                                }
                            }
                        }
                        currentTumble++; runTumble(); 
                    }, tDelay - 100);
                }, tDelay / 2); 
            }, tDelay); 
        };
        runTumble(); 
    }

    function playSlot(type) {
        let b = parseInt(document.getElementById('bet-input').value.replace(/\./g, ''));
        if(!b || b <= 0) return alert("Isi bet bosku!");
        if(type === 'manual' && b < 400) return alert("Spin minimal 400 bosku!");
        
        document.getElementById('bet-panel').classList.add('disabled'); document.getElementById('status-msg').style.display = 'block'; document.getElementById('status-msg').innerText = '🔄 MEMUTAR...'; document.getElementById('status-msg').style.color = '#fff';
        
        document.getElementById('spin-win-box').style.display = 'none';
        updateMultiBar(0, false);

        socket.emit('play_video_slot', { betAmount: b, spinType: type, gameId: 'mahjong1' }); 
    }
  </script>
</body>
</html>
