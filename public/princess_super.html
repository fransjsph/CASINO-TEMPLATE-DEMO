<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>LGOLUX PRINCESS SUPER (MAXWIN x50.000)</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root { --gold: #fde047; --bg: #2e1065; --panel: #170533; --super: #a21caf; }
    body { margin: 0; background: #000; color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; display: flex; justify-content: center;}
    .game-container { width: 100%; max-width: 420px; height: 100dvh; display: flex; flex-direction: column; background: radial-gradient(circle at top, #701a75 0%, var(--bg) 100%); position: relative; overflow: hidden;}
    
    .flash-screen { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 99;}
    .flash-screen.active { animation: flashWhite 0.5s ease-out; }
    @keyframes flashWhite { 0% { opacity: 1; } 100% { opacity: 0; } }

    @keyframes earthquake { 0%, 100% { transform: translate(0, 0) rotate(0); } 10%, 30%, 50%, 70%, 90% { transform: translate(-8px, 8px) rotate(-1deg); } 20%, 40%, 60%, 80% { transform: translate(8px, -8px) rotate(1deg); } }
    .shake-mode { animation: earthquake 0.6s ease-out; }
    
    @keyframes megaEarthquake { 0%, 100% { transform: translate(0, 0) scale(1); } 10%, 30%, 50%, 70%, 90% { transform: translate(-15px, 15px) scale(1.05) rotate(-2deg); } 20%, 40%, 60%, 80% { transform: translate(15px, -15px) scale(1.05) rotate(2deg); filter: brightness(1.5) hue-rotate(90deg); } }
    .mega-shake { animation: megaEarthquake 2s ease-in-out; }

    .top-bar { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%); position: absolute; top: 0; left: 0; right: 0; z-index: 10; padding-top: calc(15px + env(safe-area-inset-top, 0px)); }
    .btn-back { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 12px;}
    .saldo-box { background: rgba(0,0,0,0.8); border: 1px solid var(--gold); padding: 8px 18px; border-radius: 10px; font-weight: 800; color: var(--gold);}
    
    .screen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding-top: 30px; position: relative;}
    .game-title { font-size: 34px; font-weight: 900; color: #fff; text-shadow: 0 5px 15px rgba(0,0,0,0.9), 0 0 20px #e879f9; margin-bottom: 5px; font-family: cursive; letter-spacing: 1px;}
    
    .total-multi-box { background: rgba(0,0,0,0.8); border: 2px solid var(--gold); border-radius: 15px; padding: 5px 20px; display: none; flex-direction: column; align-items: center; margin-bottom: 10px; box-shadow: 0 0 20px rgba(253,224,71,0.5);}
    .tm-label { font-size: 10px; color: var(--gold); font-weight: bold;}
    .tm-val { font-size: 28px; font-weight: 900; color: #fff;}

    .slot-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; background: rgba(0,0,0,0.7); padding: 8px; border-radius: 15px; border: 3px solid #d946ef; width: 92%; box-shadow: inset 0 0 30px rgba(0,0,0,0.9); position: relative;}
    .slot-cell { aspect-ratio: 1; background: #171717; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 35px; position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.1);}
    
    .simbol-item { font-size: 35px; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5)); transition: 0.2s;}
    .simbol-item.drop { animation: dropDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes dropDown { 0% { transform: translateY(-200%); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
    .simbol-item.break { animation: popBreak 0.3s forwards; }
    @keyframes popBreak { 50% { transform: scale(1.5); filter: brightness(2); } 100% { transform: scale(0); opacity: 0; } }

    .bom-multi { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 22px; font-weight: 900; text-shadow: 0 2px 5px rgba(0,0,0,0.8); z-index: 5; animation: dropFromSky 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-radius: 50%; border: 3px solid;}
    @keyframes dropFromSky { 0% { transform: translateY(-100px) scale(2); opacity: 0; } 100% { transform: translateY(0) scale(1); opacity: 1; } }

    .float-coin { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 28px; font-weight: 900; color: #10b981; text-shadow: 0 2px 5px black, 0 0 10px white; z-index: 20; opacity: 0; pointer-events: none; width: 100%; text-align: center;}
    .float-coin.show { animation: floatUp 1s ease-out forwards; }
    @keyframes floatUp { 0% { transform: translate(-50%, -10%); opacity: 1; } 100% { transform: translate(-50%, -100px); opacity: 0; } }

    .scatter-super { font-size: 45px; animation: pulseSuperScatter 0.5s infinite alternate; filter: drop-shadow(0 0 20px #e879f9);}
    @keyframes pulseSuperScatter { 0% { transform: scale(1) rotate(-5deg); } 100% { transform: scale(1.2) rotate(5deg); filter: drop-shadow(0 0 30px #fbcfe8); } }

    .spin-win-box { background: rgba(0,0,0,0.8); border: 2px solid #10b981; border-radius: 15px; padding: 5px 20px; margin-top: 15px; text-align: center; display: none; box-shadow: 0 0 15px rgba(16,185,129,0.4); animation: popWin 0.3s ease-out;}
    @keyframes popWin { 0% { transform: scale(0.5); opacity: 0;} 100% { transform: scale(1); opacity: 1;} }
    .sw-label { font-size: 10px; color: #fff; font-weight: bold; letter-spacing: 1px;}
    .sw-val { font-size: 26px; font-weight: 900; color: #10b981; transition: color 0.3s;}

    .status-msg { font-size: 14px; font-weight: 900; color: #fff; z-index: 10; margin-top: 10px; background: rgba(0,0,0,0.9); padding: 8px 20px; border-radius: 30px; text-align: center; border: 1px solid #f0abfc; display: none;}

    .panel { background: var(--panel); padding: 15px; border-top: 3px solid #f0abfc; z-index: 10; border-radius: 25px 25px 0 0; padding-bottom: calc(15px + env(safe-area-inset-bottom, 0px));}
    .input-row { display: flex; gap: 10px; margin-bottom: 10px;}
    .bet-box { flex: 1; background: #000; border: 1px solid #701a75; border-radius: 12px; padding: 10px; display: flex; flex-direction: column;}
    .bet-box label { font-size: 10px; color:#fbcfe8; font-weight: bold; margin-bottom: 2px;}
    .bet-box input { width: 100%; border: none; background: transparent; color: white; font-size: 18px; font-weight: 900; outline: none;}
    .btn-row { display: flex; gap: 8px; margin-bottom: 8px;}
    
    .btn-spin { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: 900; font-size: 16px; cursor: pointer; color: white; background: linear-gradient(180deg, #d946ef, #a21caf); box-shadow: 0 4px 0 #701a75;}
    .btn-spin:active { transform: translateY(4px); box-shadow: 0 0 0 #701a75; }
    .btn-buy { flex: 1; padding: 8px; border-radius: 12px; border: none; font-weight: 900; font-size: 12px; cursor: pointer; color: black; background: linear-gradient(180deg, #fde047, var(--gold)); box-shadow: 0 4px 0 #b45309; display: flex; flex-direction: column; align-items: center; justify-content: center;}
    .btn-buy:active { transform: translateY(4px); box-shadow: 0 0 0 #b45309; }
    
    .btn-super { width: 100%; padding: 10px; border-radius: 12px; border: 2px solid #fbcfe8; font-weight: 900; font-size: 14px; cursor: pointer; color: white; background: linear-gradient(180deg, #a21caf, #4a044e); box-shadow: 0 4px 0 #4a044e; display: flex; justify-content: space-between; align-items: center; animation: glowSuper 2s infinite;}
    .btn-super:active { transform: translateY(4px); box-shadow: 0 0 0 #4a044e; }
    @keyframes glowSuper { 0%, 100% { box-shadow: 0 4px 0 #4a044e, 0 0 10px rgba(162,28,175,0.5); } 50% { box-shadow: 0 4px 0 #4a044e, 0 0 25px rgba(162,28,175,0.9); } }
    .disabled { filter: grayscale(1); pointer-events: none; opacity: 0.6;}

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px);}
    .modal-box { background: linear-gradient(180deg, #701a75, #4a044e); padding: 25px; border-radius: 20px; text-align: center; border: 3px solid var(--gold); width: 85%; max-width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); animation: zoomIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
    @keyframes zoomIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .modal-box h2 { margin: 0 0 10px 0; color: #fff; font-size: 22px; text-transform: uppercase;}
    .modal-box p { color: #fbcfe8; font-size: 14px; font-weight: bold; margin-bottom: 20px;}
    .modal-btn-row { display: flex; gap: 10px;}
    .btn-yes { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #10b981; color: white; font-weight: 900; font-size: 16px; cursor: pointer;}
    .btn-no { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #ef4444; color: white; font-weight: 900; font-size: 16px; cursor: pointer;}

    .win-modal { background: radial-gradient(circle, #a21caf, #4a044e); border-color: #fff; box-shadow: 0 0 50px rgba(162,28,175,0.8);}
    .win-title { font-size: 35px !important; color: #fff !important; text-shadow: 0 5px 10px rgba(0,0,0,0.5); font-style: italic;}
    .win-amount { font-size: 40px; font-weight: 900; color: #fff; margin: 15px 0; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5));}
  </style>
</head>
<body>
  <div class="game-container" id="gc">
    <div id="flash" class="flash-screen"></div>

    <div id="buy-modal" class="modal-overlay">
        <div class="modal-box">
            <h2 id="buy-title">KONFIRMASI BUY SPIN</h2>
            <p id="buy-desc">Beli fitur seharga 🪙 40.000?</p>
            <div class="modal-btn-row"><button class="btn-no" onclick="closeModal()">❌ BATAL</button><button class="btn-yes" onclick="confirmBuy()">✅ BELI</button></div>
        </div>
    </div>

    <div id="win-modal" class="modal-overlay">
        <div class="modal-box win-modal">
            <h2 id="win-title-txt" class="win-title">SENSASIONAL!</h2>
            <p style="color:white; font-size: 16px;">Total Kemenangan Anda:</p>
            <div id="win-amount" class="win-amount">🪙 0</div>
            <button class="btn-yes" style="width:100%; background:#000; color:var(--gold);" onclick="closeWinModal()">LANJUTKAN</button>
        </div>
    </div>

    <div class="top-bar">
      <a href="/" class="btn-back">🔙 LOBI</a>
      <div class="saldo-box">🪙 <span id="n-c">0</span></div>
    </div>
    
    <div class="screen">
      <div class="game-title">PRINCESS SUPER</div>
      
      <div id="tm-box" class="total-multi-box">
          <div class="tm-label">GLOBAL MULTIPLIER</div>
          <div id="tm-val" class="tm-val">x0</div>
      </div>

      <div class="slot-grid" id="grid">
          <div id="float-coin" class="float-coin">+ 🪙 0</div>
      </div>
      
      <div id="spin-win-box" class="spin-win-box">
          <div class="sw-label">KEMENANGAN SPIN INI</div>
          <div id="spin-win-val" class="sw-val">🪙 0</div>
      </div>

      <div id="status-msg" class="status-msg">MEMUTAR...</div>
    </div>

    <div class="panel" id="bet-panel">
      <div class="input-row">
        <div class="bet-box">
            <label>BET DASAR (Min. Buy: 200)</label>
            <input type="text" id="bet-input" value="400" oninput="formatRupiah(this); calcBuySpin();">
        </div>
      </div>
      <div class="btn-row">
          <button class="btn-spin" onclick="playSlot('manual')">🔄 SPIN (Min 400)</button>
          <button class="btn-buy" onclick="openBuyModal('buy')">🎁 BUY SPIN <br><small id="buy-cost">🪙 40.000</small></button>
      </div>
      <button class="btn-super" onclick="openBuyModal('super')">
          <span>💣 SUPER BUY (x500)</span>
          <span id="super-cost" style="background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 8px;">🪙 200.000</span>
      </button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let socket;
    const symbols = ['👑', '⭐', '❤️', '☀️', '🌙']; 
    let pendingBuyType = '';
    let globalMultiplier = 0;

    fetch('/api/me').then(r => r.json()).then(d => { if(!d.loggedIn) window.location.href = '/'; else masuk(d); });
    function formatRupiah(obj) { let val = obj.value.replace(/[^0-9]/g, ''); obj.value = val ? parseInt(val).toLocaleString('id-ID') : ''; }
    function calcBuySpin() { let b = parseInt(document.getElementById('bet-input').value.replace(/\./g, '')) || 0; document.getElementById('buy-cost').innerText = '🪙 ' + (b * 100).toLocaleString('id-ID'); document.getElementById('super-cost').innerText = '🪙 ' + (b * 500).toLocaleString('id-ID'); }
    function initGrid() { const grid = document.getElementById('grid'); grid.innerHTML = '<div id="float-coin" class="float-coin">+ 🪙 0</div>'; for(let i=0; i<20; i++) grid.innerHTML += `<div class="slot-cell" id="c-${i}"><div class="simbol-item drop">?</div></div>`; }
    initGrid(); calcBuySpin();

    function getMultiColor(val) {
        if(val >= 500) return { bg: 'radial-gradient(circle, #ef4444, #7f1d1d)', border: '#fca5a5', color: '#fff', icon: '❤️' };
        if(val >= 50) return { bg: 'radial-gradient(circle, #f59e0b, #b45309)', border: '#fef08a', color: '#000', icon: '⭐' };
        if(val >= 15) return { bg: 'radial-gradient(circle, #ec4899, #9d174d)', border: '#fbcfe8', color: '#fff', icon: '💖' };
        return { bg: 'radial-gradient(circle, #10b981, #064e3b)', border: '#6ee7b7', color: '#fff', icon: '💚' }; 
    }

    function openBuyModal(type) {
        let b = parseInt(document.getElementById('bet-input').value.replace(/\./g, ''));
        if(!b || b < 200) return alert("Minimal Bet Dasar 200 bosku!");
        pendingBuyType = type;
        let cost = type === 'super' ? b * 500 : b * 100;
        let title = type === 'super' ? 'SUPER BUY x500' : 'BUY SPIN x100';
        document.getElementById('buy-title').innerText = title;
        document.getElementById('buy-desc').innerText = `Beli fitur seharga 🪙 ${cost.toLocaleString('id-ID')}?`;
        document.getElementById('buy-modal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('buy-modal').style.display = 'none'; }
    function confirmBuy() { closeModal(); playSlot(pendingBuyType); }
    
    function showWinModal(amount, isMaxwin = false) {
        if(isMaxwin) {
            document.getElementById('win-title-txt').innerText = "MAXWIN 50.000X !!";
            document.getElementById('win-title-txt').style.color = "#fef08a";
        } else {
            document.getElementById('win-title-txt').innerText = "SENSASIONAL!";
        }
        document.getElementById('win-amount').innerText = `🪙 ${amount.toLocaleString('id-ID')}`;
        document.getElementById('win-modal').style.display = 'flex';
    }
    function closeWinModal() { 
        document.getElementById('win-modal').style.display = 'none'; 
        document.getElementById('bet-panel').classList.remove('disabled'); 
        document.getElementById('gc').style.background = 'radial-gradient(circle at top, #701a75 0%, var(--bg) 100%)'; 
        document.getElementById('tm-box').style.display = 'none';
        document.getElementById('status-msg').style.display = 'none';
        document.getElementById('gc').classList.remove('mega-shake');
    }

    function masuk(d) {
      document.getElementById('n-c').innerText = d.coin.toLocaleString('id-ID');
      socket = io();
      socket.on('update_coin', c => document.getElementById('n-c').innerText = c.toLocaleString('id-ID'));
      socket.on('game_result', r => { if(r.status === 'error') { alert(r.msg); document.getElementById('bet-panel').classList.remove('disabled'); document.getElementById('status-msg').style.display = 'none'; } });
      
      // LOGIKA INSTANT SUPER SCATTER
      socket.on('super_scatter_maxwin', async (data) => {
          document.getElementById('status-msg').innerText = '😱 SUPER SCATTER JATUH!!';
          document.getElementById('status-msg').style.display = 'block';
          
          for(let i=0; i<20; i++) {
              let cell = document.getElementById(`c-${i}`);
              cell.innerHTML = `<div class="simbol-item drop">${symbols[Math.floor(Math.random() * symbols.length)]}</div>`;
          }
          // 4 Super Scatter 🌟
          let sIdx = [2, 7, 12, 17];
          sIdx.forEach(idx => {
              document.getElementById(`c-${idx}`).innerHTML = `<div class="simbol-item drop scatter-super">🌟</div>`;
          });

          setTimeout(() => {
              document.getElementById('gc').classList.add('mega-shake');
              document.getElementById('flash').classList.add('active');
              
              setTimeout(() => {
                  document.getElementById('n-c').innerText = data.finalCoin.toLocaleString('id-ID');
                  showWinModal(data.finalWin, true);
              }, 2500);
          }, 1000);
      });

      socket.on('slot_normal_result', (data) => executeTumble(data, false, () => {
          let msgBox = document.getElementById('status-msg');
          msgBox.innerText = data.status === 'win' ? `🎉 MENANG: 🪙 ${data.winAmount.toLocaleString('id-ID')}` : `💀 ZONK`;
          msgBox.style.color = data.status === 'win' ? '#10b981' : '#fca5a5';
          setTimeout(() => { document.getElementById('bet-panel').classList.remove('disabled'); msgBox.style.display = 'none'; }, 1000);
      }));

      socket.on('slot_freespin_start', async (data) => {
          document.getElementById('gc').style.background = 'radial-gradient(circle at top, #db2777 0%, #4a044e 100%)'; 
          
          if(data.isMurni) {
              document.getElementById('status-msg').innerText = '👸 SCATTER DIDAPATKAN!';
              for(let i=0; i<20; i++) { let cell = document.getElementById(`c-${i}`); cell.innerHTML = `<div class="simbol-item drop">${symbols[Math.floor(Math.random() * symbols.length)]}</div>`; }
              let sIdx = [2, 7, 12, 17]; sIdx.forEach(idx => { document.getElementById(`c-${idx}`).innerHTML = `<div class="simbol-item drop" style="font-size:40px">👸</div>`; });
              await new Promise(r => setTimeout(r, 2000));
          }

          document.getElementById('tm-box').style.display = 'flex';
          globalMultiplier = 0; document.getElementById('tm-val').innerText = 'x0';
          
          let spinArray = data.spins; 
          const runSpins = async () => {
              for(let i=0; i<15; i++) {
                  document.getElementById('status-msg').innerText = `✨ FREESPIN: ${15 - i} TERSISA`;
                  await new Promise(resolve => executeTumble(spinArray[i], true, resolve));
              }
              setTimeout(() => {
                  document.getElementById('n-c').innerText = data.finalCoin.toLocaleString('id-ID');
                  showWinModal(data.finalWin); 
              }, 1000);
          };
          runSpins();
      });
    }

    function executeTumble(data, isFreespin, callback) {
        let winSym = data.symbol; let winAmt = data.winAmount || data.win; let dropMulti = data.multi; let tumbles = data.tumbles || 0; 
        let spinWinAcc = 0;
        document.getElementById('spin-win-box').style.display = 'none'; document.getElementById('spin-win-val').style.color = '#10b981';

        for(let i=0; i<20; i++) { let cell = document.getElementById(`c-${i}`); cell.innerHTML = `<div class="simbol-item drop">${symbols[Math.floor(Math.random() * symbols.length)]}</div>`; }
        document.getElementById('float-coin').classList.remove('show');

        if (winAmt === 0) { setTimeout(callback, 800); return; }

        let currentTumble = 0; let winPerTumble = Math.floor(winAmt / tumbles); 

        const runTumble = () => {
            if (currentTumble >= tumbles) {
                if (dropMulti > 0) {
                    setTimeout(() => {
                        let pIdx = Math.floor(Math.random() * 20); let style = getMultiColor(dropMulti);
                        document.getElementById(`c-${pIdx}`).innerHTML = `<div class="bom-multi" style="background:${style.bg}; border-color:${style.border}; color:${style.color};">${style.icon}<span style="font-size:12px">x${dropMulti}</span></div>`;
                        
                        if (dropMulti >= 100) { 
                            document.getElementById('gc').classList.add('shake-mode'); document.getElementById('flash').classList.add('active');
                            setTimeout(() => { document.getElementById('gc').classList.remove('shake-mode'); document.getElementById('flash').classList.remove('active'); }, 600);
                        }

                        if(isFreespin) {
                            globalMultiplier += dropMulti;
                            document.getElementById('tm-val').innerText = 'x' + globalMultiplier;
                            document.getElementById('tm-box').style.transform = 'scale(1.2)';
                            setTimeout(()=> document.getElementById('tm-box').style.transform = 'scale(1)', 200);
                        }
                        
                        setTimeout(() => {
                            let activeMulti = isFreespin ? globalMultiplier : dropMulti;
                            let totalWithMulti = spinWinAcc * activeMulti;
                            document.getElementById('spin-win-val').innerText = '🪙 ' + totalWithMulti.toLocaleString('id-ID') + ' (x' + activeMulti + ')';
                            document.getElementById('spin-win-val').style.color = '#fde047'; 
                            setTimeout(callback, 1500); 
                        }, 500);
                    }, 500);
                } else {
                    if(isFreespin && globalMultiplier > 0 && spinWinAcc > 0) {
                        let totalWithMulti = spinWinAcc * globalMultiplier;
                        document.getElementById('spin-win-val').innerText = '🪙 ' + totalWithMulti.toLocaleString('id-ID') + ' (x' + globalMultiplier + ')';
                        document.getElementById('spin-win-val').style.color = '#fde047';
                    }
                    setTimeout(callback, 800);
                }
                return;
            }

            setTimeout(() => {
                let breakIndices = [];
                while(breakIndices.length < 7) { let r = Math.floor(Math.random() * 20); if(!breakIndices.includes(r)) breakIndices.push(r); }
                
                for(let i=0; i<20; i++) { let cell = document.getElementById(`c-${i}`); if (breakIndices.includes(i)) cell.innerHTML = `<div class="simbol-item break">${winSym}</div>`; }

                setTimeout(() => {
                    let floatC = document.getElementById('float-coin'); floatC.innerText = `+ 🪙 ${winPerTumble.toLocaleString('id-ID')}`; floatC.classList.remove('show'); void floatC.offsetWidth; floatC.classList.add('show');
                    spinWinAcc += winPerTumble;
                    document.getElementById('spin-win-box').style.display = 'block'; document.getElementById('spin-win-val').innerText = '🪙 ' + spinWinAcc.toLocaleString('id-ID');
                    
                    setTimeout(() => {
                        for(let i=0; i<20; i++) { if (breakIndices.includes(i)) document.getElementById(`c-${i}`).innerHTML = `<div class="simbol-item drop">${symbols[Math.floor(Math.random() * symbols.length)]}</div>`; }
                        currentTumble++; runTumble(); 
                    }, 400);
                }, 300); 
            }, 600); 
        };
        runTumble(); 
    }

    function playSlot(type) {
        let b = parseInt(document.getElementById('bet-input').value.replace(/\./g, ''));
        if(!b || b <= 0) return alert("Isi bet bosku!");
        if(type === 'manual' && b < 400) return alert("Spin manual minimal 400 bosku!");
        if(type !== 'manual' && b < 200) return alert("Buy spin minimal bet dasar 200 bosku!");
        
        document.getElementById('bet-panel').classList.add('disabled'); document.getElementById('status-msg').style.display = 'block'; document.getElementById('status-msg').innerText = '🔄 MEMUTAR...'; document.getElementById('status-msg').style.color = '#fff';
        
        document.getElementById('spin-win-box').style.display = 'none';
        for(let i=0; i<20; i++) { let cell = document.getElementById(`c-${i}`); cell.innerHTML = `<div class="simbol-item">${symbols[Math.floor(Math.random() * symbols.length)]}</div>`; }
        socket.emit('play_video_slot', { betAmount: b, spinType: type, gameId: 'princess_super' }); // TARGET PRINCESS SUPER
    }
  </script>
</body>
