<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LGOLUX - VIP Member</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0a0a0a; --surface: #141414; --gold: #d4af37; --text: #fff; --border: rgba(255,255,255,0.08); }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; overflow: hidden; }
    .app { width: 100%; max-width: 420px; background: var(--surface); height: 100vh; display: flex; flex-direction: column; position: relative; }
    .hidden { display: none !important; }
    
    /* AUTH */
    .auth { padding: 40px; text-align: center; height: 100%; display: flex; flex-direction: column; justify-content: center; }
    input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border); background: #000; color: #fff; box-sizing: border-box; }
    .btn-main { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: 800; background: var(--gold); color: #000; cursor: pointer; text-transform: uppercase; }

    /* DASHBOARD */
    .top { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .content { padding: 20px; flex: 1; overflow-y: auto; padding-bottom: 100px; }
    .wallet { background: linear-gradient(135deg, #1f1c14, #141414); padding: 25px; border-radius: 20px; text-align: center; border: 1px solid rgba(212,175,55,0.2); margin-bottom: 20px; }
    .balance { font-size: 36px; font-weight: 800; color: var(--gold); }
    
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .card { background: #1f1f1f; padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; border: 1px solid var(--border); }
    
    /* NAV */
    .nav { position: fixed; bottom: 0; width: 100%; max-width: 420px; background: #111; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--border); }
    .nav-item { font-size: 11px; text-align: center; color: #888; cursor: pointer; }
    .nav-item.active { color: var(--gold); }

    /* MODAL */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: flex; align-items: flex-end; }
    .modal-box { width: 100%; background: var(--surface); padding: 30px; border-radius: 25px 25px 0 0; border-top: 2px solid var(--gold); animation: up 0.3s; }
    @keyframes up { from { transform: translateY(100%); } to { transform: translateY(0); } }

    /* ANIMASI GAMES */
    .v-box { height: 60px; border: 2px solid var(--gold); border-radius: 10px; margin-bottom: 15px; position: relative; overflow: hidden; display: none; }
    .v-strip { width: 1000px; height: 100%; background: repeating-linear-gradient(90deg, #ef4444 0 50px, #111 50px 100px); }
    .v-strip.run { animation: move 0.1s infinite linear; }
    @keyframes move { from { transform: translateX(0); } to { transform: translateX(-100px); } }
    
    .v-coin-box { width: 80px; height: 80px; margin: 0 auto 15px; perspective: 1000px; display: none; }
    .v-coin { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: 2s; }
    .v-coin.run { animation: flip 0.1s infinite linear; }
    @keyframes flip { from { transform: rotateY(0); } to { transform: rotateY(360deg); } }
    .v-face { position: absolute; width: 100%; height: 100%; border-radius: 50%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; font-size: 40px; background: #222; border: 3px solid var(--gold); }
  </style>
</head>
<body>
  <div class="app">
    <div id="auth-v" class="auth">
      <h1 style="color:var(--gold)">👑 LGOLUX</h1>
      <div id="f-login">
        <input id="l-u" placeholder="Username">
        <input id="l-p" type="password" placeholder="Password">
        <button class="btn-main" onclick="login()">LOGIN</button>
        <p style="font-size:12px; color:var(--gold)" onclick="toggleA()">Daftar Member Baru</p>
      </div>
      <div id="f-reg" class="hidden">
        <input id="r-u" placeholder="Username Baru">
        <input id="r-p" type="password" placeholder="Password Baru">
        <button class="btn-main" onclick="reg()">DAFTAR VIP</button>
        <p style="font-size:12px; color:var(--gold)" onclick="toggleA()">Sudah ada akun? Login</p>
      </div>
    </div>

    <div id="main-v" class="hidden" style="height:100%">
      <div class="top">
        <b>ID: <span id="n-u" style="color:var(--gold)"></span></b>
        <span onclick="logout()" style="color:red; font-size:12px; cursor:pointer">KELUAR</span>
      </div>
      <div class="content">
        <div class="wallet">
          <small>SALDO KREDIT</small>
          <div class="balance">🪙 <span id="n-c">0</span></div>
        </div>
        <div class="grid">
          <div class="card" onclick="openG('roulette')">🎰 Roulette</div>
          <div class="card" onclick="openG('coinflip')">🪙 Coin Flip</div>
          <div class="card" style="grid-column: 1/-1" onclick="openG('spinwheel')">🎡 Spin Wheel (Roda Gila)</div>
        </div>
      </div>
      <div class="nav">
        <div class="nav-item active">🏠 Home</div>
        <div class="nav-item" onclick="openM('m-depo')">💳 Deposit</div>
        <div class="nav-item" onclick="openM('m-wd')">💸 WD</div>
        <div class="nav-item" onclick="showH()">📜 History</div>
      </div>
    </div>
  </div>

  <div id="m-depo" class="modal hidden">
    <div class="modal-box">
      <h3>💳 Deposit Koin</h3>
      <input id="d-a" type="number" placeholder="Nominal Koin">
      <button class="btn-main" onclick="doD()">KIRIM REQUEST</button>
      <button onclick="closeM('m-depo')" style="width:100%; background:none; color:#888; border:none; margin-top:10px">TUTUP</button>
    </div>
  </div>

  <div id="m-wd" class="modal hidden">
    <div class="modal-box">
      <h3>💸 Tarik Koin (WD)</h3>
      <input id="w-a" type="number" placeholder="Nominal WD">
      <button class="btn-main" onclick="doW()">AJUKAN WD</button>
      <button onclick="closeM('m-wd')" style="width:100%; background:none; color:#888; border:none; margin-top:10px">TUTUP</button>
    </div>
  </div>

  <div id="m-hist" class="modal hidden">
    <div class="modal-box" style="border-radius:0; height:80vh; overflow-y:auto">
      <h3>📜 Histori Transaksi</h3>
      <div id="h-list" style="font-size:12px"></div>
      <button class="btn-main" onclick="closeM('m-hist')" style="margin-top:20px">TUTUP</button>
    </div>
  </div>

  <div id="m-roulette" class="modal hidden">
    <div class="modal-box">
      <h3 style="color:var(--gold)">🎰 Roulette Mini (x2)</h3>
      <div id="v-r-box" class="v-box"><div id="v-r-strip" class="v-strip"></div></div>
      <input id="b-r" type="number" placeholder="Bet Koin">
      <div style="display:flex; gap:10px">
        <button onclick="playG('roulette', 'merah')" style="flex:1; background:red; color:white; padding:10px; border-radius:10px; border:none; font-weight:bold;">MERAH</button>
        <button onclick="playG('roulette', 'hitam')" style="flex:1; background:#111; color:white; padding:10px; border-radius:10px; border:1px solid #333; font-weight:bold;">HITAM</button>
      </div>
      <p id="s-r" style="text-align:center; font-weight:800; margin-top:15px"></p>
      <button onclick="closeM('m-roulette')" style="width:100%; border:none; background:none; color:#888">TUTUP</button>
    </div>
  </div>

  <div id="m-coinflip" class="modal hidden">
    <div class="modal-box">
      <h3 style="color:var(--gold)">🪙 Coin Flip (x1.9)</h3>
      <div id="v-c-box" class="v-coin-box">
        <div id="v-c-coin" class="v-coin">
          <div class="v-face">🔢</div><div class="v-face" style="transform:rotateY(180deg)">🖼️</div>
        </div>
      </div>
      <input id="b-c" type="number" placeholder="Bet Koin">
      <div style="display:flex; gap:10px">
        <button onclick="playG('coinflip', 'angka')" style="flex:1; background:blue; color:white; padding:10px; border-radius:10px; border:none; font-weight:bold;">ANGKA</button>
        <button onclick="playG('coinflip', 'gambar')" style="flex:1; background:purple; color:white; padding:10px; border-radius:10px; border:none; font-weight:bold;">GAMBAR</button>
      </div>
      <p id="s-c" style="text-align:center; font-weight:800; margin-top:15px"></p>
      <button onclick="closeM('m-coinflip')" style="width:100%; border:none; background:none; color:#888">TUTUP</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let socket;
    fetch('/api/me').then(r => r.json()).then(d => { if(d.loggedIn) masuk(d); });

    function toggleA() { document.getElementById('f-login').classList.toggle('hidden'); document.getElementById('f-reg').classList.toggle('hidden'); }
    function openM(id) { document.getElementById(id).classList.remove('hidden'); }
    function closeM(id) { document.getElementById(id).classList.add('hidden'); }
    function openG(g) { openM('m-'+g); document.getElementById('s-'+g.charAt(0)).innerText = ''; }

    async function login() {
      const u = document.getElementById('l-u').value, p = document.getElementById('l-p').value;
      const res = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p}) });
      const d = await res.json(); if(d.success) location.reload(); else alert(d.msg);
    }
    async function reg() {
      const u = document.getElementById('r-u').value, p = document.getElementById('r-p').value;
      const res = await fetch('/api/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p}) });
      const d = await res.json(); alert(d.msg); if(d.success) toggleA();
    }
    async function logout() { await fetch('/api/logout',{method:'POST'}); location.reload(); }

    function masuk(d) {
      document.getElementById('auth-v').classList.add('hidden');
      document.getElementById('main-v').classList.remove('hidden');
      document.getElementById('n-u').innerText = d.username.toUpperCase();
      document.getElementById('n-c').innerText = d.coin.toLocaleString();
      socket = io();
      socket.on('update_coin', c => document.getElementById('n-c').innerText = c.toLocaleString());
      socket.on('notif_msg', m => alert(m));
      socket.on('game_result', r => {
        const s = document.getElementById('s-'+r.game.charAt(0));
        const v = document.getElementById('v-'+r.game.charAt(0)+'-'+(r.game=='roulette'?'strip':'coin'));
        v.classList.remove('run');
        if(r.game=='coinflip') v.style.transform = r.msg.includes('ANGKA') ? 'rotateY(0)' : 'rotateY(180deg)';
        s.innerText = r.msg; s.style.color = r.status=='win'?'#0f0':'#f00';
      });
    }

    function doD() { const a = document.getElementById('d-a').value; socket.emit('req_deposit', parseInt(a)); closeM('m-depo'); }
    function doW() { const a = document.getElementById('w-a').value; socket.emit('req_wd', parseInt(a)); closeM('m-wd'); }
    async function showH() {
      const r = await fetch('/api/history'); const d = await r.json();
      let h = ''; d.forEach(x => { h += `<div style="border-bottom:1px solid #333; padding:10px"><b>${x.type}</b> | 🪙 ${x.amount.toLocaleString()} | <span style="color:${x.status=='SUCCESS'?'#0f0':'#f80'}">${x.status}</span><br><small>${x.date}</small></div>`; });
      document.getElementById('h-list').innerHTML = h || 'Belum ada transaksi'; openM('m-hist');
    }

    function playG(g, c) {
      const b = parseInt(document.getElementById('b-'+g.charAt(0)).value);
      if(!b || b<=0) return alert('Bet dulu bosku!');
      document.getElementById('s-'+g.charAt(0)).innerText = '🎲 Memutar...';
      const box = document.getElementById('v-'+g.charAt(0)+'-box'); box.style.display = 'block';
      const v = document.getElementById('v-'+g.charAt(0)+'-'+(g=='roulette'?'strip':'coin'));
      v.style.transform = 'none'; setTimeout(()=>v.classList.add('run'),10);
      socket.emit('play_'+g, { betAmount:b, color:c, guess:c });
    }
  </script>
</body>
</html>
