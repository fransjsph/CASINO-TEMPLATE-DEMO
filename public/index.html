<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LGOLUX - VIP Member</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0a0a0a; --surface: #141414; --gold: #d4af37; --text: #fff; --border: rgba(255,255,255,0.08); }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; overflow: hidden; }
    .app { width: 100%; max-width: 420px; background: var(--surface); height: 100vh; display: flex; flex-direction: column; position: relative; }
    .hidden { display: none !important; }
    
    .auth { padding: 40px; text-align: center; height: 100%; display: flex; flex-direction: column; justify-content: center; }
    input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border); background: #000; color: #fff; box-sizing: border-box; font-weight:bold; }
    .btn-main { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: 800; background: var(--gold); color: #000; cursor: pointer; text-transform: uppercase; }

    .top { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .content { padding: 20px; flex: 1; overflow-y: auto; padding-bottom: 120px; }
    .wallet { background: linear-gradient(135deg, #1f1c14, #141414); padding: 25px; border-radius: 20px; text-align: center; border: 1px solid rgba(212,175,55,0.2); margin-bottom: 20px; }
    .balance { font-size: 36px; font-weight: 800; color: var(--gold); }
    
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .card { background: #1f1f1f; padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; border: 1px solid var(--border); }
    
    .nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: calc(100% - 40px); max-width: 380px; background: rgba(20, 20, 20, 0.85); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 15px 0; border-radius: 30px; border: 1px solid rgba(212,175,55,0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 50; }
    .nav-item { font-size: 11px; text-align: center; color: #888; cursor: pointer; font-weight: bold;}
    .nav-item.active { color: var(--gold); }

    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: flex; align-items: flex-end; }
    .modal-box { width: 100%; background: var(--surface); padding: 30px; border-radius: 25px 25px 0 0; border-top: 2px solid var(--gold); animation: up 0.3s; box-sizing: border-box; }
    @keyframes up { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .bet-chips { display:flex; gap:8px; overflow-x:auto; margin-bottom:15px; padding-bottom:5px; }
    .bet-chips::-webkit-scrollbar { height:4px; }
    .bet-chips::-webkit-scrollbar-thumb { background:var(--gold); border-radius:4px; }
    .bet-chips button { flex: 0 0 auto; background:#111; color:var(--gold); border:1px solid var(--gold); padding:8px 12px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:12px; }
    .bet-chips button:active { background:var(--gold); color:#000; }

    .v-box { height: 60px; border: 2px solid var(--gold); border-radius: 10px; margin-bottom: 15px; position: relative; overflow: hidden; display: none; }
    .v-strip { width: 1000px; height: 100%; background: repeating-linear-gradient(90deg, #ef4444 0 50px, #111 50px 100px); }
    .v-strip.run { animation: move 0.1s infinite linear; }
    @keyframes move { from { transform: translateX(0); } to { transform: translateX(-100px); } }
    
    .v-coin-box { width: 80px; height: 80px; margin: 0 auto 15px; perspective: 1000px; display: none; }
    .v-coin { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: 2s; }
    .v-coin.run { animation: flip 0.1s infinite linear; }
    @keyframes flip { from { transform: rotateY(0); } to { transform: rotateY(360deg); } }
    .v-face { position: absolute; width: 100%; height: 100%; border-radius: 50%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; font-size: 40px; background: #222; border: 3px solid var(--gold); }

    .v-spin-box { width:100px; height:100px; margin: 0 auto 15px; position:relative; display:none; }
    .v-spin-box::after { content:'▼'; position:absolute; top:-15px; left:50%; transform:translateX(-50%); color:var(--gold); z-index:2; font-size:20px; }
    .v-spin { width:100%; height:100%; border-radius:50%; border:3px solid var(--gold); background: conic-gradient(#ef4444 0 60deg, #111 60deg 120deg, #ef4444 120deg 180deg, #111 180deg 240deg, #ef4444 240deg 300deg, #111 300deg 360deg); transition: transform 2s cubic-bezier(0.25, 0.1, 0.25, 1); }
    .v-spin.run { animation: spin 0.2s infinite linear; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="app">
    <div id="auth-v" class="auth">
      <h1 style="color:var(--gold)">👑 LGOLUX</h1>
      <div id="f-login">
        <input id="l-u" placeholder="Username">
        <input id="l-p" type="password" placeholder="Password">
        <button class="btn-main" onclick="login()">LOGIN</button>
        <p style="font-size:12px; color:var(--gold); cursor:pointer;" onclick="toggleA()">Daftar Member Baru</p>
      </div>
      <div id="f-reg" class="hidden">
        <input id="r-u" placeholder="Username Baru">
        <input id="r-p" type="password" placeholder="Password Baru">
        <button class="btn-main" onclick="reg()">DAFTAR VIP</button>
        <p style="font-size:12px; color:var(--gold); cursor:pointer;" onclick="toggleA()">Sudah ada akun? Login</p>
      </div>
    </div>

    <div id="main-v" class="hidden" style="height:100%">
      <div class="top">
        <b>ID: <span id="n-u" style="color:var(--gold)"></span></b>
        <span onclick="logout()" style="color:red; font-size:12px; cursor:pointer">KELUAR</span>
      </div>
      <div class="content">
        <div class="wallet">
          <small>SALDO KREDIT</small>
          <div class="balance">🪙 <span id="n-c">0</span></div>
        </div>
        <div class="grid">
          <div class="card" onclick="openG('roulette')">🎰 Roulette</div>
          <div class="card" onclick="openG('coinflip')">🪙 Coin Flip</div>
          <div class="card" style="grid-column: 1/-1" onclick="openG('spinwheel')">🎡 Spin Wheel (Roda Gila)</div>
        </div>
      </div>
      
      <div class="nav">
        <div class="nav-item active" onclick="closeAllM()">🏠 HOME</div>
        <div class="nav-item" onclick="openM('m-depo')">💳 DEPOSIT</div>
        <div class="nav-item" onclick="openM('m-wd')">💸 WD</div>
        <div class="nav-item" onclick="showH()">📜 RIWAYAT</div>
      </div>
    </div>
  </div>

  <div id="m-depo" class="modal hidden">
    <div class="modal-box">
      <h3>💳 Deposit Koin</h3>
      <input id="d-a" type="text" placeholder="Nominal Deposit" oninput="formatRupiah(this)">
      <button class="btn-main" onclick="doD()">KIRIM REQUEST</button>
      <button onclick="closeM('m-depo')" style="width:100%; background:none; color:#888; border:none; margin-top:10px">TUTUP</button>
    </div>
  </div>

  <div id="m-wd" class="modal hidden">
    <div class="modal-box">
      <h3>💸 Tarik Koin (WD)</h3>
      <input id="w-a" type="text" placeholder="Nominal Tarik Tunai" oninput="formatRupiah(this)">
      <button class="btn-main" onclick="doW()">AJUKAN WD</button>
      <button onclick="closeM('m-wd')" style="width:100%; background:none; color:#888; border:none; margin-top:10px">TUTUP</button>
    </div>
  </div>

  <div id="m-hist" class="modal hidden">
    <div class="modal-box" style="height:80vh; overflow-y:auto">
      <h3>📜 Histori Transaksi</h3>
      <div id="h-list" style="font-size:12px"></div>
      <button class="btn-main" onclick="closeM('m-hist')" style="margin-top:20px">TUTUP</button>
    </div>
  </div>

  <div id="m-roulette" class="modal hidden">
    <div class="modal-box">
      <h3 style="color:var(--gold)">🎰 Roulette Mini (x2)</h3>
      <div id="v-r-box" class="v-box"><div id="v-r-strip" class="v-strip"></div></div>
      <input id="b-r" type="text" placeholder="Bet Koin (Max 100.000)" oninput="formatRupiah(this)">
      <div class="bet-chips">
        <button onclick="setBet('r', 400)">400</button> <button onclick="setBet('r', 600)">600</button>
        <button onclick="setBet('r', 800)">800</button> <button onclick="setBet('r', 1000)">1.000</button>
        <button onclick="setBet('r', 2000)">2.000</button> <button onclick="setBet('r', 3000)">3.000</button>
        <button onclick="setBet('r', 4000)">4.000</button> <button onclick="setBet('r', 100000)">MAX</button>
      </div>
      <div style="display:flex; gap:10px">
        <button onclick="playG('roulette', 'merah')" style="flex:1; background:red; color:white; padding:10px; border-radius:10px; border:none; font-weight:bold;">MERAH</button>
        <button onclick="playG('roulette', 'hitam')" style="flex:1; background:#111; color:white; padding:10px; border-radius:10px; border:1px solid #333; font-weight:bold;">HITAM</button>
      </div>
      <p id="s-r" style="text-align:center; font-weight:800; margin-top:15px"></p>
      <button onclick="closeM('m-roulette')" style="width:100%; border:none; background:none; color:#888; margin-top:10px;">TUTUP</button>
    </div>
  </div>

  <div id="m-coinflip" class="modal hidden">
    <div class="modal-box">
      <h3 style="color:var(--gold)">🪙 Coin Flip (x1.9)</h3>
      <div id="v-c-box" class="v-coin-box">
        <div id="v-c-coin" class="v-coin">
          <div class="v-face">🔢</div><div class="v-face" style="transform:rotateY(180deg)">🖼️</div>
        </div>
      </div>
      <input id="b-c" type="text" placeholder="Bet Koin (Max 100.000)" oninput="formatRupiah(this)">
      <div class="bet-chips">
        <button onclick="setBet('c', 400)">400</button> <button onclick="setBet('c', 600)">600</button>
        <button onclick="setBet('c', 800)">800</button> <button onclick="setBet('c', 1000)">1.000</button>
        <button onclick="setBet('c', 2000)">2.000</button> <button onclick="setBet('c', 3000)">3.000</button>
        <button onclick="setBet('c', 4000)">4.000</button> <button onclick="setBet('c', 100000)">MAX</button>
      </div>
      <div style="display:flex; gap:10px">
        <button onclick="playG('coinflip', 'angka')" style="flex:1; background:blue; color:white; padding:10px; border-radius:10px; border:none; font-weight:bold;">ANGKA</button>
        <button onclick="playG('coinflip', 'gambar')" style="flex:1; background:purple; color:white; padding:10px; border-radius:10px; border:none; font-weight:bold;">GAMBAR</button>
      </div>
      <p id="s-c" style="text-align:center; font-weight:800; margin-top:15px"></p>
      <button onclick="closeM('m-coinflip')" style="width:100%; border:none; background:none; color:#888; margin-top:10px;">TUTUP</button>
    </div>
  </div>

  <div id="m-spinwheel" class="modal hidden">
    <div class="modal-box">
      <h3 style="color:var(--gold)">🎡 Spin Wheel (Roda Gila)</h3>
      <div id="v-s-box" class="v-spin-box">
        <div id="v-s-spin" class="v-spin"></div>
      </div>
      <input id="b-s" type="text" placeholder="Bet Koin (Max 100.000)" oninput="formatRupiah(this)">
      <div class="bet-chips">
        <button onclick="setBet('s', 400)">400</button> <button onclick="setBet('s', 600)">600</button>
        <button onclick="setBet('s', 800)">800</button> <button onclick="setBet('s', 1000)">1.000</button>
        <button onclick="setBet('s', 2000)">2.000</button> <button onclick="setBet('s', 3000)">3.000</button>
        <button onclick="setBet('s', 4000)">4.000</button> <button onclick="setBet('s', 100000)">MAX</button>
      </div>
      <button class="btn-main" onclick="playG('spinwheel', 'spin')">🌀 PUTAR RODA</button>
      <p id="s-s" style="text-align:center; font-weight:800; margin-top:15px"></p>
      <button onclick="closeM('m-spinwheel')" style="width:100%; border:none; background:none; color:#888; margin-top:10px;">TUTUP</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let socket;
    fetch('/api/me').then(r => r.json()).then(d => { if(d.loggedIn) masuk(d); });

    function formatRupiah(obj) {
      let val = obj.value.replace(/[^0-9]/g, '');
      obj.value = val ? parseInt(val).toLocaleString('id-ID') : '';
    }
    
    function setBet(gameChar, amount) {
      document.getElementById('b-'+gameChar).value = amount.toLocaleString('id-ID');
    }

    function toggleA() { document.getElementById('f-login').classList.toggle('hidden'); document.getElementById('f-reg').classList.toggle('hidden'); }
    function openM(id) { document.getElementById(id).classList.remove('hidden'); }
    function closeM(id) { document.getElementById(id).classList.add('hidden'); }
    function closeAllM() { document.querySelectorAll('.modal').forEach(m => m.classList.add('hidden')); }
    function openG(g) { openM('m-'+g); document.getElementById('s-'+g.charAt(0)).innerText = ''; }

    // FUNGSI LOGIN & REGISTER ANTI-CRASH
    async function login() {
      const u = document.getElementById('l-u').value.trim();
      const p = document.getElementById('l-p').value.trim();
      if(!u || !p) return alert("⚠️ Username dan Password wajib diisi bosku!");
      
      try {
          const res = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p}) });
          const d = await res.json(); 
          if(d.success) location.reload(); 
          else alert(d.msg);
      } catch (err) {
          alert("⚠️ Server sedang sibuk / restart, coba beberapa detik lagi!");
      }
    }
    
    async function reg() {
      const u = document.getElementById('r-u').value.trim();
      const p = document.getElementById('r-p').value.trim();
      if(!u || !p) return alert("⚠️ Username dan Password wajib diisi bosku!");
      
      try {
          const res = await fetch('/api/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p}) });
          const d = await res.json(); 
          alert(d.msg); 
          if(d.success) toggleA();
      } catch (err) {
          alert("⚠️ Server sedang sibuk / restart, coba beberapa detik lagi!");
      }
    }
    
    async function logout() { await fetch('/api/logout',{method:'POST'}); location.reload(); }

    function masuk(d) {
      document.getElementById('auth-v').classList.add('hidden');
      document.getElementById('main-v').classList.remove('hidden');
      document.getElementById('n-u').innerText = d.username.toUpperCase();
      document.getElementById('n-c').innerText = d.coin.toLocaleString('id-ID');
      
      socket = io();
      socket.on('update_coin', c => document.getElementById('n-c').innerText = c.toLocaleString('id-ID'));
      socket.on('notif_msg', m => alert(m));
      
      socket.on('game_result', r => {
        const s = document.getElementById('s-'+r.game.charAt(0));
        const v = document.getElementById('v-'+r.game.charAt(0)+'-'+(r.game=='roulette'?'strip':(r.game=='coinflip'?'coin':'spin')));
        
        v.classList.remove('run');
        
        if(r.status === 'error') {
            s.innerText = r.msg; 
            s.style.color = '#ef4444';
            v.style.transform = 'none';
            return;
        }

        if(r.game=='coinflip') v.style.transform = r.msg.includes('ANGKA') ? 'rotateY(0)' : 'rotateY(180deg)';
        if(r.game=='spinwheel') {
            const angle = r.status == 'win' ? (Math.floor(Math.random()*360)+720) : (Math.floor(Math.random()*90)+720);
            v.style.transform = `rotate(${angle}deg)`;
        }
        
        s.innerText = r.msg; 
        s.style.color = r.status=='win'?'#10b981':'#ef4444';
      });
    }

    function doD() { 
        let val = document.getElementById('d-a').value.replace(/\./g, '');
        const a = parseInt(val); 
        if(!a || a<=0) return alert("⚠️ Nominal tidak valid bosku!");
        socket.emit('req_deposit', a); closeM('m-depo'); document.getElementById('d-a').value='';
    }
    
    function doW() { 
        let val = document.getElementById('w-a').value.replace(/\./g, '');
        const a = parseInt(val); 
        if(!a || a<=0) return alert("⚠️ Nominal tidak valid bosku!");
        socket.emit('req_wd', a); closeM('m-wd'); document.getElementById('w-a').value='';
    }
    
    async function showH() {
      const r = await fetch('/api/history'); const d = await r.json();
      let h = ''; 
      d.forEach(x => { 
        let color = x.status == 'SUCCESS' ? '#10b981' : (x.status == 'REJECTED' ? '#ef4444' : '#f59e0b');
        let noteHTML = x.note ? `<br><small style="color:#aaa;">📝 Ket: ${x.note}</small>` : '';
        h += `<div style="border-bottom:1px solid #333; padding:10px 0;">
                <b style="color:var(--gold)">${x.type}</b> | 🪙 ${x.amount.toLocaleString('id-ID')} | <span style="color:${color}; font-weight:bold;">${x.status}</span>
                <br><small>${x.date}</small>
                ${noteHTML}
              </div>`; 
      });
      document.getElementById('h-list').innerHTML = h || 'Belum ada transaksi'; 
      openM('m-hist');
    }

    function playG(g, c) {
      let rawVal = document.getElementById('b-'+g.charAt(0)).value.replace(/\./g, '');
      const b = parseInt(rawVal);
      
      if(!b || b<=0) return alert('⚠️ Pilih atau isi bet dulu bosku!');
      if(b > 100000) return alert('❌ Maksimal Bet 100.000 bosku!');
      
      document.getElementById('s-'+g.charAt(0)).innerText = '🎲 Memutar mesin...';
      document.getElementById('s-'+g.charAt(0)).style.color = '#fff';
      
      const box = document.getElementById('v-'+g.charAt(0)+'-box'); box.style.display = 'flex';
      const v = document.getElementById('v-'+g.charAt(0)+'-'+(g=='roulette'?'strip':(g=='coinflip'?'coin':'spin')));
      
      v.style.transform = 'none'; 
      setTimeout(() => v.classList.add('run'), 10);
      
      socket.emit('play_'+g, { betAmount:b, color:c, guess:c });
    }
  </script>
</body>
</html>
