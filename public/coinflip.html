<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>LGOLUX - COIN FLIP VIP</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { --gold: #d4af37; --blue: #3b82f6; --purple: #a855f7; }
    body { margin: 0; background: #000; color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; display: flex; justify-content: center;}
    
    .game-container { width: 100%; max-width: 420px; height: 100dvh; display: flex; flex-direction: column; background: #0f172a; position: relative; overflow: hidden;}
    
    .top-bar { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%); position: absolute; top: 0; left: 0; right: 0; z-index: 10; padding-top: calc(15px + env(safe-area-inset-top, 0px)); }
    .btn-back { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(5px); color: white; padding: 8px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 12px;}
    .saldo-box { background: rgba(0,0,0,0.8); border: 1px solid var(--gold); padding: 8px 18px; border-radius: 10px; font-weight: 800; color: var(--gold); box-shadow: 0 0 10px rgba(212,175,55,0.3);}

    .screen { flex: 1; background: radial-gradient(circle at center, #1e293b 0%, #020617 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative;}
    
    /* KOIN 3D PREMIUM */
    .v-coin-box { width: 150px; height: 150px; perspective: 1000px; margin-bottom: 20px; }
    .v-coin { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 2.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
    .v-coin.run { animation: flipFast 0.2s infinite linear; }
    @keyframes flipFast { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
    
    .v-face { position: absolute; width: 100%; height: 100%; border-radius: 50%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 900; border: 6px solid var(--gold); box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 10px 20px rgba(0,0,0,0.5); box-sizing: border-box; }
    
    /* Muka ANGKA */
    .face-front { background: radial-gradient(circle, var(--blue) 0%, #1e3a8a 100%); }
    .face-front::before { content: '🔢'; font-size: 40px; }
    .face-front span { font-size: 16px; margin-top: 5px; text-shadow: 0 2px 4px black; }
    
    /* Muka GAMBAR */
    .face-back { background: radial-gradient(circle, var(--purple) 0%, #581c87 100%); transform: rotateY(180deg); }
    .face-back::before { content: '🖼️'; font-size: 40px; }
    .face-back span { font-size: 16px; margin-top: 5px; text-shadow: 0 2px 4px black; }

    .status-msg { font-size: 20px; font-weight: 900; color: #fff; margin-top: 20px; text-shadow: 0 0 10px rgba(0,0,0,0.8); height: 30px;}

    /* PANEL BAWAH */
    .panel { background: #020617; padding: 20px; border-top: 2px solid var(--gold); z-index: 10; border-radius: 25px 25px 0 0; padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));}
    input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 16px; font-weight: 800; text-align: center; outline: none; margin-bottom: 15px;}
    .chips { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 15px; padding-bottom: 5px;}
    .chips::-webkit-scrollbar { height: 4px; }
    .chips button { flex: 0 0 auto; background: rgba(212,175,55,0.1); color: var(--gold); border: 1px solid rgba(212,175,55,0.3); padding: 10px 15px; border-radius: 10px; font-weight: 800; font-size: 12px;}
    
    .bet-btn-row { display: flex; gap: 10px;}
    .btn-action { flex: 1; padding: 20px; border-radius: 12px; border: none; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; color: white; transition: 0.1s;}
    .btn-action:active { transform: scale(0.95); }
    .btn-blue { background: linear-gradient(180deg, #60a5fa, var(--blue)); box-shadow: 0 5px 15px rgba(59,130,246,0.4); }
    .btn-purple { background: linear-gradient(180deg, #c084fc, var(--purple)); box-shadow: 0 5px 15px rgba(168,85,247,0.4); }
    
    .disabled { filter: grayscale(1); opacity: 0.5; pointer-events: none;}
  </style>
</head>
<body>
  <div class="game-container">
    <div class="top-bar">
      <a href="/" class="btn-back">🔙 LOBI LGO</a>
      <div class="saldo-box">🪙 <span id="n-c">0</span></div>
    </div>

    <div class="screen">
      <div class="v-coin-box">
          <div id="v-coin" class="v-coin">
              <div class="v-face face-front"><span>ANGKA</span></div>
              <div class="v-face face-back"><span>GAMBAR</span></div>
          </div>
      </div>
      <div id="status-msg" class="status-msg">PILIH SISI KOIN</div>
    </div>

    <div class="panel" id="bet-panel">
      <input type="text" id="bet-input" placeholder="Masukkan Bet (Koin)" oninput="formatRupiah(this)">
      <div class="chips">
        <button onclick="setBet(1000)">1K</button> <button onclick="setBet(5000)">5K</button>
        <button onclick="setBet(10000)">10K</button> <button onclick="setBet(50000)">50K</button> 
        <button onclick="setBet(100000)">100K</button> <button onclick="setBet(1000000)">MAX</button>
      </div>
      <div class="bet-btn-row">
          <button class="btn-action btn-blue" onclick="playGame('angka')">ANGKA (x1.9)</button>
          <button class="btn-action btn-purple" onclick="playGame('gambar')">GAMBAR (x1.9)</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let socket;
    fetch('/api/me').then(r => r.json()).then(d => { if(!d.loggedIn) window.location.href = '/'; else masuk(d); });
    function formatRupiah(obj) { let val = obj.value.replace(/[^0-9]/g, ''); obj.value = val ? parseInt(val).toLocaleString('id-ID') : ''; }
    function setBet(val) { document.getElementById('bet-input').value = val.toLocaleString('id-ID'); }

    function masuk(d) {
      document.getElementById('n-c').innerText = d.coin.toLocaleString('id-ID');
      socket = io();
      socket.on('update_coin', c => document.getElementById('n-c').innerText = c.toLocaleString('id-ID'));
      
      socket.on('game_result', r => {
          if (r.game !== 'coinflip') return;
          const coin = document.getElementById('v-coin');
          coin.classList.remove('run');
          
          if (r.status === 'error') {
              alert(r.msg); resetUI(); return;
          }
          
          let msgBox = document.getElementById('status-msg');
          msgBox.innerText = r.msg;
          msgBox.style.color = r.status === 'win' ? '#10b981' : '#ef4444';
          
          // Berhenti di sisi yang tepat (putaran minimal 2x = 720deg)
          let finalRot = r.msg.includes('ANGKA') ? 720 : 900; 
          coin.style.transform = `rotateY(${finalRot}deg)`;
          
          setTimeout(resetUI, 3000);
      });
    }

    function playGame(guess) {
        let b = parseInt(document.getElementById('bet-input').value.replace(/\./g, ''));
        const curr = parseInt(document.getElementById('n-c').innerText.replace(/\./g, '')) || 0;
        
        if(!b || b <= 0) return alert("Isi bet dulu bosku!");
        if(b > 1000000) return alert("Max Bet 1.000.000!");
        if(b > curr) return alert("Saldo kurang!");
        
        document.getElementById('bet-panel').classList.add('disabled');
        document.getElementById('status-msg').innerText = '🪙 MELEMPAR KOIN...';
        document.getElementById('status-msg').style.color = '#fff';
        
        const coin = document.getElementById('v-coin');
        coin.style.transform = 'none';
        setTimeout(() => coin.classList.add('run'), 10);
        
        socket.emit('play_coinflip', { betAmount: b, guess: guess });
    }
    
    function resetUI() {
        document.getElementById('bet-panel').classList.remove('disabled');
        document.getElementById('status-msg').innerText = 'PILIH SISI KOIN';
        document.getElementById('status-msg').style.color = '#fff';
    }
  </script>
</body>
</html>
