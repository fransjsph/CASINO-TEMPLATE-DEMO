<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>LGOLUX - BACCARAT VIP</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { --gold: #d4af37; --bg-table: #064e3b; --player: #3b82f6; --banker: #ef4444; --tie: #10b981; }
    body { margin: 0; background: #000; color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; display: flex; justify-content: center;}
    
    .game-container { width: 100%; max-width: 420px; height: 100dvh; display: flex; flex-direction: column; background: #0f172a; position: relative; overflow: hidden;}
    
    .top-bar { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%); position: absolute; top: 0; left: 0; right: 0; z-index: 10; padding-top: calc(15px + env(safe-area-inset-top, 0px)); }
    .btn-back { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(5px); color: white; padding: 8px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 12px;}
    .saldo-box { background: rgba(0,0,0,0.8); border: 1px solid var(--gold); padding: 8px 18px; border-radius: 10px; font-weight: 800; color: var(--gold); box-shadow: 0 0 10px rgba(212,175,55,0.3);}

    .screen { flex: 1; position: relative; background: radial-gradient(ellipse at top, #059669 0%, var(--bg-table) 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; padding-top: 50px;}
    .table-arc { position: absolute; bottom: 0; width: 120%; height: 60%; border-top: 3px solid rgba(212,175,55,0.4); border-radius: 50% 50% 0 0; background: rgba(0,0,0,0.1);}

    .board { display: flex; justify-content: space-around; width: 100%; z-index: 5; margin-bottom: 10px;}
    .side { text-align: center; width: 45%; }
    .side h3 { margin: 0 0 10px 0; text-transform: uppercase; font-size: 14px; text-shadow: 0 2px 5px rgba(0,0,0,0.5); padding: 5px; border-radius: 8px; background: rgba(0,0,0,0.3); border: 1px solid;}
    
    .p-side h3 { color: var(--player); border-color: rgba(59,130,246,0.3);} 
    .b-side h3 { color: var(--banker); border-color: rgba(239,68,68,0.3);} 

    /* KONTAINER 2 KARTU */
    .cards-container { display: flex; gap: 5px; justify-content: center; min-height: 85px; margin-bottom: 15px;}
    
    /* ANIMASI FLIP KARTU */
    .card-box { 
        width: 50px; height: 75px; background: white; border-radius: 5px; color: black; 
        font-size: 24px; font-weight: 900; display: flex; align-items: center; justify-content: center; 
        box-shadow: 2px 5px 15px rgba(0,0,0,0.6); 
        opacity: 0; transform: translateY(-40px) rotateY(180deg) scale(0.8); 
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .card-box.show { opacity: 1; transform: translateY(0) rotateY(0deg) scale(1); }
    
    .card-red { color: #ef4444; }
    .card-black { color: #111; }

    .score { font-size: 30px; font-weight: 900; background: rgba(0,0,0,0.7); width: 50px; height: 50px; line-height: 50px; border-radius: 50%; margin: 0 auto; border: 2px solid; opacity: 0; transition: 0.3s; transform: scale(0.5);}
    .score.show { opacity: 1; transform: scale(1); }
    
    .p-side .score { border-color: var(--player); color: var(--player); box-shadow: 0 0 15px rgba(59,130,246,0.5);}
    .b-side .score { border-color: var(--banker); color: var(--banker); box-shadow: 0 0 15px rgba(239,68,68,0.5);}

    .status-msg { font-size: 16px; font-weight: 900; color: #fff; z-index: 10; margin-top: 10px; background: rgba(0,0,0,0.8); padding: 10px 25px; border-radius: 30px; text-align: center; border: 1px solid var(--gold); box-shadow: 0 0 15px rgba(212,175,55,0.5); display: none;}

    .panel { background: #020617; padding: 20px; border-top: 2px solid var(--gold); z-index: 10; border-radius: 25px 25px 0 0; padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));}
    input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 16px; font-weight: 800; text-align: center; outline: none; margin-bottom: 15px;}
    
    .chips { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 15px; padding-bottom: 5px;}
    .chips::-webkit-scrollbar { height: 4px; }
    .chips::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    .chips button { flex: 0 0 auto; background: rgba(212,175,55,0.1); color: var(--gold); border: 1px solid rgba(212,175,55,0.3); padding: 10px 15px; border-radius: 10px; font-weight: 800; font-size: 12px;}
    
    .bet-btn-row { display: flex; gap: 10px;}
    .btn-action { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: 900; font-size: 14px; cursor: pointer; text-transform: uppercase; color: white; transition: 0.1s;}
    .btn-action:active { transform: translateY(2px); }
    .btn-p { background: linear-gradient(180deg, #60a5fa, var(--player)); box-shadow: 0 5px 15px rgba(59,130,246,0.4); }
    .btn-t { background: linear-gradient(180deg, #34d399, var(--tie)); box-shadow: 0 5px 15px rgba(16,185,129,0.4); }
    .btn-b { background: linear-gradient(180deg, #f87171, var(--banker)); box-shadow: 0 5px 15px rgba(239,68,68,0.4); }
    
    .disabled { filter: grayscale(1); opacity: 0.5; pointer-events: none;}
  </style>
</head>
<body>
  <div class="game-container">
    <div class="top-bar">
      <a href="/" class="btn-back">🔙 LOBI LGO</a>
      <div class="saldo-box">🪙 <span id="n-c">0</span></div>
    </div>

    <div class="screen">
      <div class="table-arc"></div>
      
      <div class="board">
          <div class="side p-side">
              <h3>PLAYER (x2)</h3>
              <div class="cards-container">
                  <div id="c-p-1" class="card-box"></div>
                  <div id="c-p-2" class="card-box"></div>
              </div>
              <div id="score-p" class="score">0</div>
          </div>
          <div class="side b-side">
              <h3>BANKER (x1.95)</h3>
              <div class="cards-container">
                  <div id="c-b-1" class="card-box"></div>
                  <div id="c-b-2" class="card-box"></div>
              </div>
              <div id="score-b" class="score">0</div>
          </div>
      </div>
      
      <div id="status-msg" class="status-msg">MEMBAGIKAN KARTU...</div>
    </div>

    <div class="panel" id="bet-panel">
      <input type="text" id="bet-input" placeholder="Masukkan Bet (Koin)" oninput="formatRupiah(this)">
      <div class="chips">
        <button onclick="setBet(1000)">1K</button> <button onclick="setBet(5000)">5K</button>
        <button onclick="setBet(10000)">10K</button> <button onclick="setBet(50000)">50K</button> 
        <button onclick="setBet(100000)">100K</button> <button onclick="setBet(500000)">500K</button> <button onclick="setBet(1000000)">MAX</button>
      </div>
      <div class="bet-btn-row">
          <button class="btn-action btn-p" onclick="playGame('player')">PLAYER</button>
          <button class="btn-action btn-t" onclick="playGame('tie')">TIE (x8)</button>
          <button class="btn-action btn-b" onclick="playGame('banker')">BANKER</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let socket;
    fetch('/api/me').then(r => r.json()).then(d => { if(!d.loggedIn) window.location.href = '/'; else masuk(d); });
    function formatRupiah(obj) { let val = obj.value.replace(/[^0-9]/g, ''); obj.value = val ? parseInt(val).toLocaleString('id-ID') : ''; }
    function setBet(val) { document.getElementById('bet-input').value = val.toLocaleString('id-ID'); }

    // RUMUS MATEMATIKA BACCARAT ASLI
    function generateCardsForScore(targetScore) {
        let val1 = Math.floor(Math.random() * 10); 
        let val2 = (targetScore - val1) % 10;
        if (val2 < 0) val2 += 10;

        const formatCard = (v) => {
            if (v === 0) return ['10', 'J', 'Q', 'K'][Math.floor(Math.random()*4)];
            if (v === 1) return 'A';
            return v;
        };
        
        const isRed = () => Math.random() > 0.5 ? 'card-red' : 'card-black';
        const suits = ['♥','♦','♣','♠'];
        const getSuit = () => suits[Math.floor(Math.random()*4)];

        return [
            { val: formatCard(val1), color: isRed(), suit: getSuit() },
            { val: formatCard(val2), color: isRed(), suit: getSuit() }
        ];
    }

    function masuk(d) {
      document.getElementById('n-c').innerText = d.coin.toLocaleString('id-ID');
      socket = io();
      socket.on('update_coin', c => document.getElementById('n-c').innerText = c.toLocaleString('id-ID'));
      
      socket.on('game_result', r => {
          if (r.game !== 'baccarat') return;
          if (r.status === 'error') {
              alert(r.msg); resetUI(); return;
          }
          
          let pCards = generateCardsForScore(r.pScore);
          let bCards = generateCardsForScore(r.bScore);
          
          let cp1 = document.getElementById('c-p-1'); let cb1 = document.getElementById('c-b-1');
          let cp2 = document.getElementById('c-p-2'); let cb2 = document.getElementById('c-b-2');
          let sp = document.getElementById('score-p'); let sb = document.getElementById('score-b');
          let msgBox = document.getElementById('status-msg');

          cp1.innerHTML = `<span class="${pCards[0].color}">${pCards[0].val}<br><small style="font-size:12px">${pCards[0].suit}</small></span>`;
          cb1.innerHTML = `<span class="${bCards[0].color}">${bCards[0].val}<br><small style="font-size:12px">${bCards[0].suit}</small></span>`;
          cp2.innerHTML = `<span class="${pCards[1].color}">${pCards[1].val}<br><small style="font-size:12px">${pCards[1].suit}</small></span>`;
          cb2.innerHTML = `<span class="${bCards[1].color}">${bCards[1].val}<br><small style="font-size:12px">${bCards[1].suit}</small></span>`;
          
          sp.innerText = r.pScore; sb.innerText = r.bScore;

          // ===============================================
          // LOGIKA ANIMASI JEDA 3 DETIK (EFEK "DEG-DEGAN")
          // ===============================================
          
          // Detik ke 0.5: Buka Kartu 1 Player
          setTimeout(() => cp1.classList.add('show'), 500);   
          
          // Detik ke 1.0: Buka Kartu 1 Banker
          setTimeout(() => cb1.classList.add('show'), 1000);  
          
          // Tahan napas! Kasih tulisan efek mengintip kartu...
          setTimeout(() => {
              msgBox.innerText = '👀 MENGINTIP KARTU KEDUA...';
              msgBox.style.color = '#fef08a'; // Warna kuning berdebar
          }, 1500);

          // Detik ke 4.0 (Jeda 3 Detik dari kartu 1): Buka Kartu 2 Player
          setTimeout(() => cp2.classList.add('show'), 4000);  
          
          // Detik ke 4.5: Buka Kartu 2 Banker
          setTimeout(() => cb2.classList.add('show'), 4500);  
          
          // Detik ke 5.0: Munculin Total Skor & Tulisan Siapa Menang!
          setTimeout(() => {
              sp.classList.add('show');
              sb.classList.add('show');
              msgBox.innerText = r.msg;
              msgBox.style.color = r.status === 'win' ? '#10b981' : '#ef4444';
          }, 5000);

          // Reset ke awal setelah player puas liat skor (Total di detik 9)
          setTimeout(resetUI, 9000); 
      });
    }

    function playGame(choice) {
        let b = parseInt(document.getElementById('bet-input').value.replace(/\./g, ''));
        const curr = parseInt(document.getElementById('n-c').innerText.replace(/\./g, '')) || 0;
        
        if(!b || b <= 0) return alert("Isi bet dulu bosku!");
        if(b > 1000000) return alert("Max Bet 1.000.000!");
        if(b > curr) return alert("Saldo kurang!");
        
        document.getElementById('bet-panel').classList.add('disabled');
        
        let msg = document.getElementById('status-msg');
        msg.style.display = 'block';
        msg.innerText = '⏳ MEMBAGIKAN KARTU 1...';
        msg.style.color = '#fff';
        
        socket.emit('play_baccarat', { betAmount: b, choice: choice });
    }
    
    function resetUI() {
        document.getElementById('bet-panel').classList.remove('disabled');
        document.getElementById('status-msg').style.display = 'none';
        
        ['c-p-1', 'c-b-1', 'c-p-2', 'c-b-2'].forEach(id => {
            let el = document.getElementById(id);
            el.classList.remove('show');
            setTimeout(() => el.innerHTML = '', 400); 
        });
        
        ['score-p', 'score-b'].forEach(id => {
            let el = document.getElementById(id);
            el.classList.remove('show');
            setTimeout(() => el.innerText = '0', 400);
        });
    }
  </script>
</body>
</html>
