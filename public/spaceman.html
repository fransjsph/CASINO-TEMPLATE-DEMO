<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>LGOLUX - SPACEMAN PRO</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { --blue-prime: #3b82f6; --green-prime: #10b981; --red-prime: #ef4444; --gold-prime: #d4af37; }
    body { margin: 0; background: #000; color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; display: flex; justify-content: center;}
    
    .game-container { 
        width: 100%; max-width: 420px; 
        height: 100vh; height: 100dvh; 
        display: flex; flex-direction: column; 
        background: #0f172a; position: relative; overflow: hidden;
    }
    
    .top-bar { 
        padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
        background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%); 
        position: absolute; top: 0; left: 0; right: 0; z-index: 10;
        padding-top: calc(15px + env(safe-area-inset-top, 0px));
    }
    .btn-back { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(5px); color: white; padding: 8px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 12px;}
    .saldo-box { background: rgba(0,0,0,0.8); border: 1px solid var(--gold-prime); padding: 8px 18px; border-radius: 10px; font-weight: 800; color: var(--gold-prime); box-shadow: 0 0 10px rgba(212,175,55,0.3);}

    .screen { flex: 1; position: relative; background: radial-gradient(circle at center, #1e3a8a 0%, #020617 100%); overflow: hidden; display: flex; align-items: center; justify-content: center; flex-direction: column;}
    
    .stars { position: absolute; inset: 0; background-image: radial-gradient(white 1px, transparent 0); background-size: 25px 25px; opacity: 0.3; }
    .stars.run { animation: moveStars 0.8s linear infinite; }
    @keyframes moveStars { from { background-position: 0 0; } to { background-position: 0 100px; } }
    
    .speed-lines { position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 20px, rgba(255,255,255,0.05) 20px, rgba(255,255,255,0.05) 21px); display: none;}
    .speed-lines.run { display: block; animation: moveLines 0.2s linear infinite; }
    @keyframes moveLines { from { background-position: 0 0; } to { background-position: 0 100px; } }

    #s-multi { font-size: 80px; font-weight: 900; color: #fff; z-index: 10; text-shadow: 0 0 20px rgba(59,130,246,0.8); letter-spacing: -2px;}
    #s-potensi { font-size: 24px; color: var(--green-prime); font-weight: 800; z-index: 10; margin-top: -10px; display: none; background: rgba(0,0,0,0.6); padding: 8px 20px; border-radius: 30px; backdrop-filter: blur(5px); border: 1px solid rgba(16,185,129,0.3);}
    
    /* KEMBALI KE ROKET EMOJI YANG GACOR */
    #s-roket { 
        font-size: 80px; position: absolute; bottom: 20px; left: 50%; 
        transform: translateX(-50%); transition: all 0.1s linear; 
        z-index: 5; text-shadow: 0 10px 20px rgba(239,68,68,0.8);
    }

    .status-msg { font-size: 16px; font-weight: bold; color: #ef4444; z-index: 10; position: absolute; top: calc(100px + env(safe-area-inset-top, 0px)); text-transform: uppercase; background: rgba(0,0,0,0.8); padding: 8px 20px; border-radius: 30px; display: none; text-align: center; max-width: 80%; border: 1px solid #ef4444; box-shadow: 0 0 15px rgba(239,68,68,0.3);}

    .panel { 
        background: #020617; padding: 20px; border-top: 2px solid rgba(59,130,246,0.3); z-index: 10; border-radius: 25px 25px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
    }
    
    .input-row { display: flex; gap: 10px; margin-bottom: 10px;}
    .in-box { flex: 1; }
    .in-box label { font-size: 11px; color:#888; font-weight: bold; display: block; margin-bottom: 4px; text-transform: uppercase;}
    
    input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 16px; font-weight: 800; text-align: center; outline: none; transition: 0.2s;}
    input:focus { border-color: var(--blue-prime); box-shadow: 0 0 10px rgba(59,130,246,0.3);}
    
    .chips { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 15px; padding-bottom: 5px;}
    .chips::-webkit-scrollbar { height: 4px; }
    .chips::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    .chips button { flex: 0 0 auto; background: rgba(59,130,246,0.1); color: #fff; border: 1px solid rgba(59,130,246,0.3); padding: 10px 15px; border-radius: 10px; font-weight: 800; font-size: 12px; cursor: pointer;}
    .chips button:active { background: var(--blue-prime); }

    .btn-action { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: 900; font-size: 20px; cursor: pointer; text-transform: uppercase; color: white; background: linear-gradient(180deg, #60a5fa 0%, var(--blue-prime) 100%); box-shadow: 0 5px 15px rgba(59,130,246,0.4); transition: 0.1s; outline: none;}
    .btn-action:active { transform: translateY(2px); box-shadow: 0 2px 5px rgba(59,130,246,0.4); }
    .btn-action.cashout { background: linear-gradient(180deg, #34d399 0%, var(--green-prime) 100%); box-shadow: 0 5px 20px rgba(16,185,129,0.5); animation: pulseWin 1s infinite;}
    @keyframes pulseWin { 0% { box-shadow: 0 5px 15px rgba(16,185,129,0.5); } 50% { box-shadow: 0 5px 25px rgba(16,185,129,0.8); } 100% { box-shadow: 0 5px 15px rgba(16,185,129,0.5); } }
    .btn-action.disabled { background: #475569; color: #94a3b8; cursor: not-allowed; box-shadow: none; transform: none;}
  </style>
</head>
<body>
  <div class="game-container">
    <div class="top-bar">
      <a href="/" class="btn-back">🔙 LOBI LGO</a>
      <div class="saldo-box">🪙 <span id="n-c">0</span></div>
    </div>

    <div class="screen">
      <div id="stars" class="stars"></div>
      <div id="speed-lines" class="speed-lines"></div>
      <div id="status-msg" class="status-msg"></div>
      
      <div id="s-multi">x1.00</div>
      <div id="s-potensi">🪙 0</div>
      <div id="s-roket">🚀</div> </div>

    <div class="panel">
      <div class="input-row">
        <div class="in-box">
            <label>JUMLAH BET</label>
            <input type="text" id="bet-input" placeholder="0" oninput="formatRupiah(this)">
        </div>
        <div class="in-box">
            <label>AUTO CASHOUT (X)</label>
            <input type="number" id="auto-input" step="0.1" placeholder="Kosong">
        </div>
      </div>
      
      <div class="chips">
        <button onclick="setBet(1000)">1K</button> <button onclick="setBet(5000)">5K</button>
        <button onclick="setBet(10000)">10K</button> <button onclick="setBet(50000)">50K</button> 
        <button onclick="setBet(100000)">100K</button> <button onclick="setBet(500000)">500K</button> <button onclick="setBet(1000000)">MAX</button>
      </div>

      <button id="btn-main" class="btn-action" onclick="startGame()">🚀 PASANG BET</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let socket;
    let sInterval;
    let currMulti = 1.00;
    let targetMulti = 1.00;
    let isFlying = false;
    let hasCashedOut = false;
    let currentBet = 0;
    let autoVal = 0;

    fetch('/api/me').then(r => r.json()).then(d => { 
        if(!d.loggedIn) window.location.href = '/';
        else masuk(d);
    });

    function formatRupiah(obj) { let val = obj.value.replace(/[^0-9]/g, ''); obj.value = val ? parseInt(val).toLocaleString('id-ID') : ''; }
    function setBet(val) { document.getElementById('bet-input').value = val.toLocaleString('id-ID'); }

    function masuk(d) {
      document.getElementById('n-c').innerText = d.coin.toLocaleString('id-ID');
      socket = io();
      socket.on('update_coin', c => document.getElementById('n-c').innerText = c.toLocaleString('id-ID'));
      socket.on('start_spaceman', (data) => mulaiTerbang(data.crashPoint));
      socket.on('spaceman_cashed_out', (data) => suksesCashout(data));
      socket.on('game_result', r => { if(r.status === 'error') { alert(r.msg); resetUI(); } });
    }

    function startGame() {
        if(isFlying) { cashout(); return; }
        
        let rawVal = document.getElementById('bet-input').value.replace(/\./g, '');
        let b = parseInt(rawVal);
        const curr = parseInt(document.getElementById('n-c').innerText.replace(/\./g, '')) || 0;
        
        if(!b || b <= 0) return alert("Isi bet dulu bosku!");
        if(b > curr) return alert("Saldo kurang!");
        
        currentBet = b; // Simpan nilai bet yang valid buat dihitung nanti
        autoVal = parseFloat(document.getElementById('auto-input').value) || 0;
        
        document.getElementById('btn-main').innerText = 'MEMUAT...';
        document.getElementById('btn-main').className = 'btn-action disabled';
        
        socket.emit('play_spaceman', { betAmount: b });
    }

    function mulaiTerbang(crashPoint) {
        targetMulti = crashPoint;
        currMulti = 1.00;
        isFlying = true;
        hasCashedOut = false;
        
        document.getElementById('stars').classList.add('run');
        document.getElementById('speed-lines').classList.add('run');
        
        // Reset warna & posisi
        document.getElementById('s-potensi').style.display = 'block';
        document.getElementById('s-potensi').style.color = 'var(--green-prime)';
        document.getElementById('status-msg').style.display = 'none';
        document.getElementById('s-roket').innerText = '🚀';
        document.getElementById('s-roket').style.transform = 'translateX(-50%)';
        document.getElementById('s-roket').style.bottom = '20px';
        document.getElementById('s-roket').style.opacity = '1';
        
        let btn = document.getElementById('btn-main');
        btn.innerText = '💰 TARIK DANA'; 
        btn.className = 'btn-action cashout';

        sInterval = setInterval(() => {
            // FIX BUG ANGKA: Tambah speed, lalu potong jadi 2 desimal biar ga ngaco
            currMulti += 0.01 + (currMulti * 0.015);
            let displayMulti = parseFloat(currMulti.toFixed(2));

            if (displayMulti >= targetMulti) {
                // ROKET MELEDAK
                currMulti = targetMulti; 
                displayMulti = targetMulti;
                isFlying = false; 
                clearInterval(sInterval);
                
                document.getElementById('s-multi').innerText = 'x' + displayMulti.toFixed(2);
                document.getElementById('s-multi').style.color = 'var(--red-prime)';
                document.getElementById('stars').classList.remove('run');
                document.getElementById('speed-lines').classList.remove('run');
                document.getElementById('s-roket').innerText = '💥';
                document.getElementById('btn-main').style.display = 'none'; 

                let msg = document.getElementById('status-msg'); 
                msg.style.display = 'block';
                
                if(hasCashedOut) {
                    msg.innerText = `Nyesel kan tarik duluan? Tembus x${targetMulti.toFixed(2)} nih! 🤪💸`;
                    msg.style.color = 'var(--green-prime)'; msg.style.borderColor = 'var(--green-prime)';
                } else {
                    msg.innerText = '💥 BUSTED! SPACEMAN HANCUR!';
                    msg.style.color = 'var(--red-prime)'; msg.style.borderColor = 'var(--red-prime)';
                    socket.emit('crash_spaceman'); 
                }
                setTimeout(resetUI, 3500);
            } else {
                // ROKET MASIH TERBANG (JALAN MULUS)
                document.getElementById('s-multi').innerText = 'x' + displayMulti.toFixed(2);
                
                if(!hasCashedOut) {
                    // FIX BUG SALDO BERJALAN: Hitung dari displayMulti yang udah presisi
                    let runWin = Math.floor(currentBet * displayMulti);
                    document.getElementById('s-potensi').innerText = '🪙 ' + runWin.toLocaleString('id-ID');
                    
                    // Efek getar normal
                    let shake = (Math.random() * 6) - 3;
                    document.getElementById('s-roket').style.transform = `translateX(calc(-50% + ${shake}px))`;
                    
                    // Auto cashout cek
                    if(autoVal > 1.0 && displayMulti >= autoVal) cashout(autoVal);
                } else {
                    // FOMO RUN - Roket menjauh dan memudar
                    document.getElementById('s-multi').style.color = '#475569';
                    document.getElementById('s-roket').style.transform = `translateX(-50%) translateY(-150px) scale(0.5)`;
                    document.getElementById('s-roket').style.opacity = `0.5`;
                }
            }
        }, 50);
    }

    function cashout(forced = null) {
        if(!isFlying || hasCashedOut) return;
        hasCashedOut = true;
        let final = forced || parseFloat(currMulti.toFixed(2));
        socket.emit('cashout_spaceman', { stoppedAt: final });
    }

    function suksesCashout(data) {
        let btn = document.getElementById('btn-main');
        btn.innerText = `✅ CAIR: x${data.multi.toFixed(2)}`;
        btn.className = 'btn-action disabled';
        document.getElementById('s-potensi').style.color = '#fff';
    }

    function resetUI() {
        isFlying = false; 
        hasCashedOut = false;
        document.getElementById('btn-main').style.display = 'block';
        document.getElementById('btn-main').innerText = '🚀 PASANG BET';
        document.getElementById('btn-main').className = 'btn-action';
        document.getElementById('s-potensi').style.display = 'none';
        document.getElementById('s-multi').style.color = '#fff';
        document.getElementById('s-roket').innerText = '🚀';
        document.getElementById('s-roket').style.transform = 'translateX(-50%)';
        document.getElementById('s-roket').style.bottom = '20px';
        document.getElementById('s-roket').style.opacity = '1';
    }
  </script>
</body>
</html>
