<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><title>LGOLUX - EXECUTIVE ADMIN</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family:'Plus Jakarta Sans'; background:#0f172a; color:#f8fafc; padding:20px; }
    .card { background:#1e293b; padding:20px; border-radius:15px; border:1px solid #334155; margin-bottom:20px; }
    h3 { color:#10b981; margin-top:0; }
    table { width:100%; border-collapse:collapse; font-size:12px; }
    td, th { padding:10px; border-bottom:1px solid #334155; text-align:left; }
    input, select { background:#0f172a; border:1px solid #334155; color:#fff; padding:10px; border-radius:5px; width:100%; box-sizing:border-box; margin-bottom: 10px; }
    button { background:#10b981; color:#000; border:none; padding:10px; border-radius:5px; font-weight:800; cursor:pointer; }
    .modal { position:fixed; inset:0; background:rgba(0,0,0,0.8); display:flex; justify-content:center; align-items:center; }
    .modal-box { background:#1e293b; padding:30px; border-radius:20px; width:350px; border:1px solid #10b981; }
    .hidden { display:none; }
  </style>
</head>
<body>
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <h2>💼 LGOLUX EXECUTIVE ADMIN</h2>
    <button onclick="fetch('/api/logout', {method:'POST'}).then(()=>location.href='/')" style="background: red; color: white;">LOGOUT</button>
  </div>
  
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px">
    <div class="card">
      <h3>🔔 Antrean Transaksi (Depo/WD)</h3>
      <table>
        <thead><tr><th>User</th><th>Tipe</th><th>Nominal</th><th>Aksi</th></tr></thead>
        <tbody id="tx-list"></tbody>
      </table>
    </div>

    <div class="card">
      <h3 style="color:#ef4444">🎛️ RTP Control Bandar</h3>
      <label style="font-size: 12px; color: #888;">Roulette Win Rate (%)</label>
      <input type="number" id="r-r">
      <label style="font-size: 12px; color: #888;">Coinflip Win Rate (%)</label>
      <input type="number" id="r-c">
      <label style="font-size: 12px; color: #888;">SpinWheel Multiplier Rate (%)</label>
      <input type="number" id="r-s">
      <button style="background:red; width: 100%; margin-top: 10px; color: white;" onclick="saveRTP()">UPDATE WIN RATE</button>
    </div>

    <div class="card" style="grid-column: 1/-1">
      <h3>👥 Manajemen Member</h3>
      <table id="user-table">
        <thead><tr><th>ID Member</th><th>Saldo Koin</th><th>Status Akun</th><th>Aksi Admin</th></tr></thead>
        <tbody id="u-list"></tbody>
      </table>
    </div>
  </div>

  <div id="m-edit" class="modal hidden">
    <div class="modal-box">
      <h3>⚙️ Edit Member: <span id="e-n" style="color: var(--gold);"></span></h3>
      <label style="font-size: 12px; color: #888;">Ubah Saldo Koin:</label>
      <input type="number" id="e-c">
      <label style="font-size: 12px; color: #888;">Ganti Password (Opsional):</label>
      <input type="text" id="e-p" placeholder="Isi jika mau ganti, kosongkan jika tidak">
      <label style="font-size: 12px; color: #888;">Status Akun:</label>
      <select id="e-s">
        <option value="AKTIF">AKTIF (Bisa Main)</option>
        <option value="BLOKIR">BLOKIR (Banned)</option>
      </select>
      <button onclick="saveU()" style="width:100%; margin-top: 15px;">SIMPAN PERUBAHAN</button>
      <button onclick="closeM()" style="width:100%; background:none; color:#ef4444; margin-top:10px">BATAL</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let socket, selectedId;
    fetch('/api/me').then(r => r.json()).then(d => { if(d.role=='admin') start(); else window.location.href='/'; });

    function start() {
      socket = io(); loadU();
      socket.emit('get_pending_deposits'); socket.emit('get_rtp');
      socket.on('admin_deposit_list', d => {
        let h = ''; d.forEach(x => { h += `<tr><td>${x.username}</td><td><b style="color:${x.type=='DEPOSIT'?'#10b981':'#ef4444'}">${x.type}</b></td><td>${x.amount.toLocaleString()}</td><td><button onclick="approve(${x.id})">Approve</button></td></tr>`; });
        document.getElementById('tx-list').innerHTML = h || '<tr><td colspan="4" style="text-align:center; padding:20px; color:#888;">Tidak ada antrean</td></tr>';
      });
      socket.on('rtp_data', d => { document.getElementById('r-r').value=d.roulette; document.getElementById('r-c').value=d.coinflip; document.getElementById('r-s').value=d.spinwheel; });
      socket.on('deposit_approved_success', () => socket.emit('get_pending_deposits'));
      socket.on('admin_new_notif', () => socket.emit('get_pending_deposits'));
      socket.on('notif_msg', m => alert(m));
    }

    async function loadU() {
      const r = await fetch('/api/admin/users'); const d = await r.json();
      let h = ''; d.forEach(x => { h += `<tr><td><b>${x.username.toUpperCase()}</b></td><td style="color:#10b981; font-weight:bold;">🪙 ${x.coin.toLocaleString()}</td><td><span style="background:${x.status=='AKTIF'?'#065f46':'#7f1d1d'}; padding:5px 10px; border-radius:5px;">${x.status}</span></td><td><button onclick='openE(${JSON.stringify(x)})'>Manage</button></td></tr>`; });
      document.getElementById('u-list').innerHTML = h;
    }
    function openE(u) { selectedId=u.id; document.getElementById('e-n').innerText=u.username.toUpperCase(); document.getElementById('e-c').value=u.coin; document.getElementById('e-s').value=u.status; document.getElementById('m-edit').classList.remove('hidden'); }
    function closeM() { document.getElementById('m-edit').classList.add('hidden'); document.getElementById('e-p').value = ''; }
    
    async function saveU() {
      const c = document.getElementById('e-c').value, s = document.getElementById('e-s').value, p = document.getElementById('e-p').value;
      await fetch('/api/admin/update-user', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id:selectedId, coin:c, status:s, password:p}) });
      alert('Data Member Berhasil Diupdate!'); location.reload();
    }
    
    function approve(id) { if(confirm('Approve transaksi ini? Pastikan jika WD, Anda sudah transfer uangnya.')) socket.emit('admin_approve_deposit', id); }
    function saveRTP() { socket.emit('update_rtp', { roulette:document.getElementById('r-r').value, coinflip:document.getElementById('r-c').value, spinwheel:document.getElementById('r-s').value }); }
  </script>
</body>
</html>
