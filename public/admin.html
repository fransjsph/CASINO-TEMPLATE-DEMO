<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LGOLUX - EXECUTIVE ADMIN</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family:'Plus Jakarta Sans'; background:#0f172a; color:#f8fafc; padding:20px; margin:0; }
    .card { background:#1e293b; padding:20px; border-radius:15px; border:1px solid #334155; margin-bottom:20px; overflow-x:auto; }
    h3 { color:#10b981; margin-top:0; }
    table { width:100%; border-collapse:collapse; font-size:12px; min-width: 400px; }
    td, th { padding:10px; border-bottom:1px solid #334155; text-align:left; }
    input, select { background:#0f172a; border:1px solid #334155; color:#fff; padding:12px; border-radius:8px; width:100%; box-sizing:border-box; margin-bottom: 15px; outline:none; }
    button { background:#10b981; color:#000; border:none; padding:12px; border-radius:8px; font-weight:800; cursor:pointer; width: 100%; }
    .btn-red { background: #ef4444; color: white; }
    .modal { position:fixed; inset:0; background:rgba(0,0,0,0.8); display:flex; justify-content:center; align-items:center; z-index: 1000; padding: 20px;}
    .modal-box { background:#1e293b; padding:25px; border-radius:20px; width:100%; max-width:400px; border:1px solid #10b981; box-sizing: border-box;}
    .hidden { display:none !important; }
    .grid-layout { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
    @media (max-width: 768px) { .grid-layout { grid-template-columns: 1fr; } body { padding: 15px; } }
  </style>
</head>
<body>

  <div id="login-view" class="card hidden" style="max-width: 400px; margin: 50px auto; text-align: center;">
    <h2 style="color:#10b981; margin-top:0;">🛡️ ADMIN LOGIN</h2>
    <input type="text" id="l-u" placeholder="Admin Username">
    <input type="password" id="l-p" placeholder="Admin Password">
    <button onclick="login()">OTORISASI MASUK</button>
  </div>

  <div id="dash-view" class="hidden">
    <div style="display: flex; justify-content: space-between; align-items: center; background:#1e293b; padding: 15px 20px; border-radius: 15px; margin-bottom: 20px;">
      <h2 style="margin:0; font-size: 18px;">💼 ADMIN PANEL</h2>
      <button onclick="logout()" class="btn-red" style="width: auto; padding: 8px 15px;">LOGOUT</button>
    </div>
    
    <div class="grid-layout">
      <div class="card">
        <h3>🔔 Antrean Transaksi</h3>
        <table>
          <thead><tr><th>User</th><th>Tipe</th><th>Nominal</th><th>Aksi</th></tr></thead>
          <tbody id="tx-list"></tbody>
        </table>
      </div>

      <div class="card" style="border-color:#ef4444;">
        <h3 style="color:#ef4444">🎛️ RTP Control Bandar</h3>
        <label style="font-size: 12px; color: #888;">Roulette Win Rate (%)</label>
        <input type="number" id="r-r">
        <label style="font-size: 12px; color: #888;">Coinflip Win Rate (%)</label>
        <input type="number" id="r-c">
        <label style="font-size: 12px; color: #888;">SpinWheel Multiplier Rate (%)</label>
        <input type="number" id="r-s">
        <button class="btn-red" onclick="saveRTP()">UPDATE WIN RATE</button>
      </div>

      <div class="card">
        <h3>➕ Buat Akun Member Manual</h3>
        <label style="font-size: 12px; color: #888;">Username Baru:</label>
        <input type="text" id="new-mem-user" placeholder="Ketik Username">
        <label style="font-size: 12px; color: #888;">Password Baru:</label>
        <input type="text" id="new-mem-pass" placeholder="Ketik Password (Cth: player123)">
        <button onclick="createMember()">DAFTARKAN MEMBER</button>
      </div>

      <div class="card" style="grid-column: 1/-1">
        <h3>👥 Manajemen Member</h3>
        <div style="overflow-x:auto;">
          <table>
            <thead><tr><th>User</th><th>Saldo</th><th>Status</th><th>Aksi</th></tr></thead>
            <tbody id="u-list"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div id="m-edit" class="modal hidden">
    <div class="modal-box">
      <h3>⚙️ Edit Member: <span id="e-n" style="color: #10b981;"></span></h3>
      
      <label style="font-size: 12px; color: #888;">Ubah Saldo Koin:</label>
      <input type="number" id="e-c">
      
      <label style="font-size: 12px; color: #ef4444; font-weight:bold;">Keterangan Adjustment (WAJIB jika saldo diubah):</label>
      <input type="text" id="e-note" placeholder="Misal: Bonus JP / Tarik Saldo Penipu">
      
      <label style="font-size: 12px; color: #888;">Ganti Password (Opsional):</label>
      <input type="text" id="e-p" placeholder="Kosongkan jika tidak ganti">
      
      <label style="font-size: 12px; color: #888;">Status Akun:</label>
      <select id="e-s">
        <option value="AKTIF">AKTIF</option>
        <option value="BLOKIR">BLOKIR</option>
      </select>
      
      <button onclick="saveU()">SIMPAN PERUBAHAN</button>
      <button onclick="closeM()" style="background:none; color:#ef4444; border:1px solid #ef4444; margin-top:10px">BATAL</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let socket, selectedUser;

    fetch('/api/me').then(r => r.json()).then(d => { 
      if(d.loggedIn && d.role === 'admin') masukAdmin(); 
      else document.getElementById('login-view').classList.remove('hidden'); 
    });

    async function login() {
      const u = document.getElementById('l-u').value, p = document.getElementById('l-p').value;
      const res = await fetch('/api/login', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username:u, password:p}) });
      const d = await res.json();
      if(d.success && d.role === 'admin') location.reload();
      else alert("Akses Ditolak!");
    }

    async function logout() { await fetch('/api/logout', {method:'POST'}); window.location.href = '/'; }

    // FUNGSI BUAT AKUN MANUAL
    async function createMember() {
      const u = document.getElementById('new-mem-user').value; 
      const p = document.getElementById('new-mem-pass').value;
      if(!u || !p) return alert("Isi Username dan Password bosku!");
      
      const res = await fetch('/api/register', { 
        method: 'POST', 
        headers:{'Content-Type':'application/json'}, 
        body: JSON.stringify({username:u, password:p, role:'member'}) 
      });
      const data = await res.json();
      alert(data.msg);
      
      if(data.success) { 
        document.getElementById('new-mem-user').value = ''; 
        document.getElementById('new-mem-pass').value = ''; 
        loadU(); // Otomatis refresh tabel member
      }
    }

    function masukAdmin() {
      document.getElementById('login-view').classList.add('hidden');
      document.getElementById('dash-view').classList.remove('hidden');
      
      socket = io(); loadU();
      socket.emit('get_pending_deposits'); socket.emit('get_rtp');
      
      socket.on('admin_deposit_list', d => {
        let h = ''; d.forEach(x => { 
            h += `<tr>
                <td>${x.username.toUpperCase()}</td>
                <td><b style="color:${x.type=='DEPOSIT'?'#10b981':'#ef4444'}">${x.type}</b></td>
                <td>${x.amount.toLocaleString('id-ID')}</td>
                <td>
                    <div style="display:flex; gap:5px;">
                        <button onclick="approve(${x.id}, '${x.type}')" style="padding:5px; font-size:10px;">ACC</button>
                        <button onclick="reject(${x.id})" class="btn-red" style="padding:5px; font-size:10px;">TOLAK</button>
                    </div>
                </td>
            </tr>`; 
        });
        document.getElementById('tx-list').innerHTML = h || '<tr><td colspan="4" style="text-align:center; padding:20px; color:#888;">Antrean Kosong</td></tr>';
      });
      
      socket.on('rtp_data', d => { document.getElementById('r-r').value=d.roulette; document.getElementById('r-c').value=d.coinflip; document.getElementById('r-s').value=d.spinwheel; });
      socket.on('deposit_approved_success', () => socket.emit('get_pending_deposits'));
      socket.on('admin_new_notif', () => socket.emit('get_pending_deposits'));
      socket.on('notif_msg', m => alert(m));
    }

    async function loadU() {
      const r = await fetch('/api/admin/users'); const d = await r.json();
      let h = ''; d.forEach(x => { h += `<tr><td><b>${x.username.toUpperCase()}</b></td><td style="color:#10b981;">🪙 ${x.coin.toLocaleString('id-ID')}</td><td><span style="background:${x.status=='AKTIF'?'#065f46':'#7f1d1d'}; padding:2px 5px; border-radius:5px; font-size:10px;">${x.status}</span></td><td><button onclick='openE(${JSON.stringify(x)})' style="padding:5px 10px; width:auto;">Edit</button></td></tr>`; });
      document.getElementById('u-list').innerHTML = h;
    }

    function openE(u) { 
        selectedUser = u; 
        document.getElementById('e-n').innerText = u.username.toUpperCase(); 
        document.getElementById('e-c').value = u.coin; 
        document.getElementById('e-s').value = u.status; 
        document.getElementById('e-note').value = ''; 
        document.getElementById('m-edit').classList.remove('hidden'); 
    }
    
    function closeM() { document.getElementById('m-edit').classList.add('hidden'); document.getElementById('e-p').value = ''; }
    
    async function saveU() {
      const c = document.getElementById('e-c').value, s = document.getElementById('e-s').value, p = document.getElementById('e-p').value, note = document.getElementById('e-note').value;
      
      if (c != selectedUser.coin && !note.trim()) {
          return alert('BOSKU! Keterangan wajib diisi kalau saldo member diubah!');
      }

      await fetch('/api/admin/update-user', { 
          method:'POST', headers:{'Content-Type':'application/json'}, 
          body:JSON.stringify({id: selectedUser.id, username: selectedUser.username, coin: c, status: s, password: p, note: note}) 
      });
      alert('Data Member Berhasil Diupdate!'); location.reload();
    }
    
    function approve(id, type) { 
        if(confirm(`Approve ${type} ini?`)) socket.emit('admin_approve_tx', id); 
    }
    
    function reject(id) {
        let alasan = prompt("Masukkan alasan penolakan (Contoh: Saldo tidak valid / Rekening salah):");
        if(alasan) {
            socket.emit('admin_reject_tx', { id: id, reason: alasan });
        }
    }

    function saveRTP() { socket.emit('update_rtp', { roulette:document.getElementById('r-r').value, coinflip:document.getElementById('r-c').value, spinwheel:document.getElementById('r-s').value }); }
  </script>
</body>
</html>
